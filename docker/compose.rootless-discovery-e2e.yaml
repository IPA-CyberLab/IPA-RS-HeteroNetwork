services:
  agent:
    environment:
      IPARS_DOCKER_DISCOVER_NETWORKS: "true"
      IPARS_DOCKER_CONTAINER_CIDRS: !reset null
      IPARS_DOCKER_NETWORKS: ${IPARS_ROOTLESS_DOCKER_NETWORK_A:?set IPARS_ROOTLESS_DOCKER_NETWORK_A}

  agent-b:
    environment:
      IPARS_DOCKER_DISCOVER_NETWORKS: "true"
      IPARS_DOCKER_CONTAINER_CIDRS: !reset null
      IPARS_DOCKER_NETWORKS: ${IPARS_ROOTLESS_DOCKER_NETWORK_B:?set IPARS_ROOTLESS_DOCKER_NETWORK_B}
