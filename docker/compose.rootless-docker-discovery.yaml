services:
  agent:
    environment:
      - HETERONETWORK_DOCKER_API_SOCKET=/run/heteronetwork/docker.sock
    volumes:
      - type: bind
        source: ${HETERONETWORK_DOCKER_API_SOCKET_HOST:-${XDG_RUNTIME_DIR:?set XDG_RUNTIME_DIR}/docker.sock}
        target: /run/heteronetwork/docker.sock
        read_only: true
        bind:
          create_host_path: false

  agent-b:
    environment:
      - HETERONETWORK_DOCKER_API_SOCKET=/run/heteronetwork/docker.sock
    volumes:
      - type: bind
        source: ${HETERONETWORK_DOCKER_API_SOCKET_HOST:-${XDG_RUNTIME_DIR:?set XDG_RUNTIME_DIR}/docker.sock}
        target: /run/heteronetwork/docker.sock
        read_only: true
        bind:
          create_host_path: false
