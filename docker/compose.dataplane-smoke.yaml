services:
  postgres:
    ports: !reset []

  control-plane:
    command:
      - control-plane
      - --listen
      - 0.0.0.0:8443
      - --cluster-id
      - ${HETERONETWORK_DATAPLANE_CLUSTER_ID:?set HETERONETWORK_DATAPLANE_CLUSTER_ID}
      - --issuer-node-id
      - ${HETERONETWORK_DATAPLANE_ISSUER_NODE_ID:?set HETERONETWORK_DATAPLANE_ISSUER_NODE_ID}
      - --issuer-key-id
      - root
      - --issuer-public-key
      - ${HETERONETWORK_DATAPLANE_ISSUER_PUBLIC_KEY:?set HETERONETWORK_DATAPLANE_ISSUER_PUBLIC_KEY}
    environment: !override
      HETERONETWORK_DATABASE_URL: postgres://heteronetwork:heteronetwork-dev@postgres:5432/heteronetwork
      HETERONETWORK_ROLE: control-plane
      HETERONETWORK_CONTROL_PLANE_OPERATOR_API_BEARER_TOKEN: ${HETERONETWORK_DATAPLANE_CONTROL_PLANE_OPERATOR_API_BEARER_TOKEN:?set HETERONETWORK_DATAPLANE_CONTROL_PLANE_OPERATOR_API_BEARER_TOKEN}
      HETERONETWORK_SERVICE_INSTANCE_ID: public-a
      HETERONETWORK_ADVERTISE_CONTROL_PLANE_URL: http://control-plane:8443
      HETERONETWORK_ADVERTISE_SIGNAL_URL: http://control-plane:9443
      HETERONETWORK_ADVERTISE_STUN_URL: udp://control-plane:3478
      HETERONETWORK_ADVERTISE_RELAY_URL: udp://control-plane:51820
      HETERONETWORK_ADVERTISE_WEB_UI_URL: http://control-plane:8443
      HETERONETWORK_SERVICE_LEASE_TTL_SECONDS: "6"
      HETERONETWORK_SERVICE_LEASE_RENEW_INTERVAL_SECONDS: "2"
    ports: !reset []
    secrets: !reset []

  control-plane-b:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - control-plane
      - --listen
      - 0.0.0.0:8443
      - --cluster-id
      - ${HETERONETWORK_DATAPLANE_CLUSTER_ID:?set HETERONETWORK_DATAPLANE_CLUSTER_ID}
      - --issuer-node-id
      - ${HETERONETWORK_DATAPLANE_ISSUER_NODE_ID:?set HETERONETWORK_DATAPLANE_ISSUER_NODE_ID}
      - --issuer-key-id
      - root
      - --issuer-public-key
      - ${HETERONETWORK_DATAPLANE_ISSUER_PUBLIC_KEY:?set HETERONETWORK_DATAPLANE_ISSUER_PUBLIC_KEY}
    environment:
      HETERONETWORK_DATABASE_URL: postgres://heteronetwork:heteronetwork-dev@postgres:5432/heteronetwork
      HETERONETWORK_ROLE: control-plane
      HETERONETWORK_CONTROL_PLANE_OPERATOR_API_BEARER_TOKEN: ${HETERONETWORK_DATAPLANE_CONTROL_PLANE_OPERATOR_API_BEARER_TOKEN:?set HETERONETWORK_DATAPLANE_CONTROL_PLANE_OPERATOR_API_BEARER_TOKEN}
      HETERONETWORK_SERVICE_INSTANCE_ID: public-b
      HETERONETWORK_ADVERTISE_CONTROL_PLANE_URL: http://control-plane-b:8443
      HETERONETWORK_ADVERTISE_SIGNAL_URL: http://control-plane-b:9443
      HETERONETWORK_ADVERTISE_STUN_URL: udp://control-plane-b:3478
      HETERONETWORK_ADVERTISE_RELAY_URL: udp://control-plane-b:51820
      HETERONETWORK_ADVERTISE_WEB_UI_URL: http://control-plane-b:8443
      HETERONETWORK_SERVICE_LEASE_TTL_SECONDS: "6"
      HETERONETWORK_SERVICE_LEASE_RENEW_INTERVAL_SECONDS: "2"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8443/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    ports: !reset []
    secrets: !reset []

  signal:
    network_mode: service:control-plane
    environment: !override
      HETERONETWORK_ROLE: signal
      HETERONETWORK_SIGNAL_CONTROL_PLANE_URLS: http://127.0.0.1:8443,http://control-plane-b:8443
    depends_on: !override
      control-plane:
        condition: service_healthy
    ports: !reset []
    secrets: !reset []

  signal-b:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - signal
      - --listen
      - 0.0.0.0:9443
    network_mode: service:control-plane-b
    environment:
      HETERONETWORK_ROLE: signal
      HETERONETWORK_SIGNAL_CONTROL_PLANE_URLS: http://127.0.0.1:8443,http://control-plane:8443
    depends_on:
      control-plane-b:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9443/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    ports: !reset []
    secrets: !reset []

  stun:
    network_mode: service:control-plane
    environment: !override
      HETERONETWORK_ROLE: stun
      HETERONETWORK_STUN_ALTERNATE_LISTEN: 0.0.0.0:3480
    ports: !reset []
    secrets: !reset []

  stun-b:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - stun
      - --listen
      - 0.0.0.0:3478
      - --http-listen
      - 0.0.0.0:3479
    network_mode: service:control-plane-b
    environment:
      HETERONETWORK_ROLE: stun
      HETERONETWORK_STUN_ALTERNATE_LISTEN: 0.0.0.0:3480
    depends_on:
      control-plane-b:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3479/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    ports: !reset []
    secrets: !reset []

  relay:
    network_mode: service:control-plane
    environment: !override
      HETERONETWORK_ROLE: relay
      HETERONETWORK_RELAY_PUBLIC_ENDPOINT: 127.0.0.1:51820
      HETERONETWORK_RELAY_ADMISSION_URL: http://127.0.0.1:9580
      HETERONETWORK_RELAY_MAX_SESSIONS: "10000"
      HETERONETWORK_RELAY_MAX_MBPS: "1000"
    cap_add: !reset []
    devices: !reset []
    ports: !reset []
    secrets: !reset []

  relay-b:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - relay
      - --relay-node-id
      - relay-dataplane-b
      - --udp-listen
      - 0.0.0.0:51820
      - --http-listen
      - 0.0.0.0:9580
    network_mode: service:control-plane-b
    environment:
      HETERONETWORK_ROLE: relay
      HETERONETWORK_RELAY_PUBLIC_ENDPOINT: 127.0.0.1:51820
      HETERONETWORK_RELAY_ADMISSION_URL: http://127.0.0.1:9580
      HETERONETWORK_RELAY_MAX_SESSIONS: "10000"
      HETERONETWORK_RELAY_MAX_MBPS: "1000"
    depends_on:
      control-plane-b:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9580/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  agent:
    network_mode: !reset null
    networks:
      - default
      - workload-a
      - workload-a-v6
    command:
      - agent
      - --listen
      - 0.0.0.0:9780
      - --state-path
      - /var/lib/heteronetwork/agent.json
      - --apply-peer-map
      - --peer-map-poll-interval-seconds
      - "1"
      - --signal-path-interval-seconds
      - "1"
      - --heartbeat-interval-seconds
      - "1"
      - --stun-server
      - ${HETERONETWORK_DATAPLANE_BOOTSTRAP_IP:?set HETERONETWORK_DATAPLANE_BOOTSTRAP_IP}:3478
    environment: !override
      HETERONETWORK_ROLE: agent
      HETERONETWORK_AGENT_JOIN_TOKEN: ${HETERONETWORK_DATAPLANE_JOIN_TOKEN:?set HETERONETWORK_DATAPLANE_JOIN_TOKEN}
      HETERONETWORK_AGENT_API_BEARER_TOKEN: ${HETERONETWORK_DATAPLANE_AGENT_API_BEARER_TOKEN:?set HETERONETWORK_DATAPLANE_AGENT_API_BEARER_TOKEN}
      HETERONETWORK_AGENT_STUN_BIND: 0.0.0.0:51820
      HETERONETWORK_AGENT_DISABLE_PUBLIC_STUN_FALLBACK: "true"
      HETERONETWORK_AGENT_WIREGUARD_LISTEN_PORT: "51820"
      HETERONETWORK_AGENT_RUNTIME_BACKEND: linux-command
      HETERONETWORK_AGENT_WIREGUARD_BACKEND: command
      HETERONETWORK_AGENT_ROUTE_BACKEND: command
      HETERONETWORK_AGENT_DISABLE_PEER_PROBE: "true"
      HETERONETWORK_AGENT_APPLY_DOCKER_ROUTES: "true"
      HETERONETWORK_DOCKER_DISCOVER_NETWORKS: "true"
      HETERONETWORK_DOCKER_API_SOCKET: /run/heteronetwork/docker.sock
      HETERONETWORK_DOCKER_NETWORKS: ${HETERONETWORK_DATAPLANE_WORKLOAD_A_NETWORK:?set HETERONETWORK_DATAPLANE_WORKLOAD_A_NETWORK},${HETERONETWORK_DATAPLANE_WORKLOAD_A_V6_NETWORK:?set HETERONETWORK_DATAPLANE_WORKLOAD_A_V6_NETWORK},${HETERONETWORK_DATAPLANE_ROUTE_A_NETWORK:?set HETERONETWORK_DATAPLANE_ROUTE_A_NETWORK}
      HETERONETWORK_DOCKER_CONTAINER_NAMESPACE: docker-workload-a
      HETERONETWORK_DOCKER_HOST_INTERFACE: eth1
      HETERONETWORK_DOCKER_EXPOSE_HOST_ROUTES: "true"
      HETERONETWORK_DOCKER_ROUTE_INTERVAL_SECONDS: "1"
    depends_on: !override
      control-plane:
        condition: service_healthy
      control-plane-b:
        condition: service_healthy
      signal:
        condition: service_healthy
      stun:
        condition: service_healthy
    ports: !reset []
    cap_add: !override
      - NET_ADMIN
      - NET_RAW
    devices: !reset []
    secrets: !reset []
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv6.conf.all.forwarding: "1"
    volumes: !override
      - agent-dataplane-a:/var/lib/heteronetwork
      - type: bind
        source: ${HETERONETWORK_DOCKER_API_SOCKET_HOST:?set HETERONETWORK_DOCKER_API_SOCKET_HOST}
        target: /run/heteronetwork/docker.sock
        read_only: true
        bind:
          create_host_path: false

  agent-b:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    networks:
      - default
      - workload-b
      - workload-b-v6
    command:
      - agent
      - --listen
      - 0.0.0.0:9780
      - --state-path
      - /var/lib/heteronetwork/agent-b.json
      - --apply-peer-map
      - --peer-map-poll-interval-seconds
      - "1"
      - --signal-path-interval-seconds
      - "1"
      - --heartbeat-interval-seconds
      - "1"
      - --stun-server
      - ${HETERONETWORK_DATAPLANE_BOOTSTRAP_IP:?set HETERONETWORK_DATAPLANE_BOOTSTRAP_IP}:3478
    environment:
      HETERONETWORK_ROLE: agent
      HETERONETWORK_AGENT_JOIN_TOKEN: ${HETERONETWORK_DATAPLANE_JOIN_TOKEN:?set HETERONETWORK_DATAPLANE_JOIN_TOKEN}
      HETERONETWORK_AGENT_API_BEARER_TOKEN: ${HETERONETWORK_DATAPLANE_AGENT_API_BEARER_TOKEN:?set HETERONETWORK_DATAPLANE_AGENT_API_BEARER_TOKEN}
      HETERONETWORK_AGENT_STUN_BIND: 0.0.0.0:51820
      HETERONETWORK_AGENT_DISABLE_PUBLIC_STUN_FALLBACK: "true"
      HETERONETWORK_AGENT_WIREGUARD_LISTEN_PORT: "51820"
      HETERONETWORK_AGENT_RUNTIME_BACKEND: linux-command
      HETERONETWORK_AGENT_WIREGUARD_BACKEND: command
      HETERONETWORK_AGENT_ROUTE_BACKEND: command
      HETERONETWORK_AGENT_DISABLE_PEER_PROBE: "true"
      HETERONETWORK_AGENT_APPLY_DOCKER_ROUTES: "true"
      HETERONETWORK_DOCKER_DISCOVER_NETWORKS: "true"
      HETERONETWORK_DOCKER_API_SOCKET: /run/heteronetwork/docker.sock
      HETERONETWORK_DOCKER_NETWORKS: ${HETERONETWORK_DATAPLANE_WORKLOAD_B_NETWORK:?set HETERONETWORK_DATAPLANE_WORKLOAD_B_NETWORK},${HETERONETWORK_DATAPLANE_WORKLOAD_B_V6_NETWORK:?set HETERONETWORK_DATAPLANE_WORKLOAD_B_V6_NETWORK},${HETERONETWORK_DATAPLANE_ROUTE_B_NETWORK:?set HETERONETWORK_DATAPLANE_ROUTE_B_NETWORK}
      HETERONETWORK_DOCKER_CONTAINER_NAMESPACE: docker-workload-b
      HETERONETWORK_DOCKER_HOST_INTERFACE: eth1
      HETERONETWORK_DOCKER_EXPOSE_HOST_ROUTES: "true"
      HETERONETWORK_DOCKER_ROUTE_INTERVAL_SECONDS: "1"
    depends_on:
      control-plane:
        condition: service_healthy
      control-plane-b:
        condition: service_healthy
      signal:
        condition: service_healthy
      stun:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9780/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv6.conf.all.forwarding: "1"
    volumes:
      - agent-dataplane-b:/var/lib/heteronetwork
      - type: bind
        source: ${HETERONETWORK_DOCKER_API_SOCKET_HOST:?set HETERONETWORK_DOCKER_API_SOCKET_HOST}
        target: /run/heteronetwork/docker.sock
        read_only: true
        bind:
          create_host_path: false

  agent-failover:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - agent
      - --listen
      - 0.0.0.0:9780
      - --state-path
      - /var/lib/heteronetwork/agent-failover.json
      - --apply-peer-map
      - --peer-map-poll-interval-seconds
      - "1"
      - --heartbeat-interval-seconds
      - "1"
      - --signal-path-interval-seconds
      - "1"
    environment:
      HETERONETWORK_ROLE: agent
      HETERONETWORK_AGENT_JOIN_TOKEN: ${HETERONETWORK_DATAPLANE_JOIN_TOKEN:?set HETERONETWORK_DATAPLANE_JOIN_TOKEN}
      HETERONETWORK_AGENT_API_BEARER_TOKEN: ${HETERONETWORK_DATAPLANE_AGENT_API_BEARER_TOKEN:?set HETERONETWORK_DATAPLANE_AGENT_API_BEARER_TOKEN}
      HETERONETWORK_AGENT_STUN_BIND: 0.0.0.0:51820
      HETERONETWORK_AGENT_DISABLE_PUBLIC_STUN_FALLBACK: "true"
      HETERONETWORK_AGENT_WIREGUARD_LISTEN_PORT: "51820"
      HETERONETWORK_AGENT_RUNTIME_BACKEND: dry-run
      HETERONETWORK_AGENT_WIREGUARD_BACKEND: command
      HETERONETWORK_AGENT_ROUTE_BACKEND: command
      HETERONETWORK_AGENT_DISABLE_PEER_PROBE: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9780/healthz >/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s
    ports: !reset []
    cap_add: !reset []
    devices: !reset []
    secrets: !reset []
    volumes:
      - agent-dataplane-failover:/var/lib/heteronetwork

  workload-a:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - stun
      - --listen
      - 0.0.0.0:3478
      - --http-listen
      - 0.0.0.0:8080
    networks:
      - workload-a
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  workload-b:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - stun
      - --listen
      - 0.0.0.0:3478
      - --http-listen
      - 0.0.0.0:8080
    networks:
      - workload-b
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  workload-a-v6:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - stun
      - --listen
      - "[::]:3478"
      - --http-listen
      - "[::]:8080"
    networks:
      - workload-a-v6
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD-SHELL", "curl --noproxy '*' -g -fsS 'http://[::1]:8080/healthz' >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  workload-b-v6:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - stun
      - --listen
      - "[::]:3478"
      - --http-listen
      - "[::]:8080"
    networks:
      - workload-b-v6
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD-SHELL", "curl --noproxy '*' -g -fsS 'http://[::1]:8080/healthz' >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

networks:
  workload-a:
  workload-b:
  workload-a-v6:
    enable_ipv6: true
    ipam:
      config:
        - subnet: ${HETERONETWORK_DATAPLANE_WORKLOAD_A_V6_CIDR:?set HETERONETWORK_DATAPLANE_WORKLOAD_A_V6_CIDR}
  workload-b-v6:
    enable_ipv6: true
    ipam:
      config:
        - subnet: ${HETERONETWORK_DATAPLANE_WORKLOAD_B_V6_CIDR:?set HETERONETWORK_DATAPLANE_WORKLOAD_B_V6_CIDR}

volumes:
  agent-dataplane-a:
  agent-dataplane-b:
  agent-dataplane-failover:
