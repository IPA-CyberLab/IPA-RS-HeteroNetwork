services:
  postgres:
    ports: !reset []

  control-plane:
    command:
      - control-plane
      - --listen
      - 0.0.0.0:8443
      - --cluster-id
      - ${IPARS_DATAPLANE_CLUSTER_ID:?set IPARS_DATAPLANE_CLUSTER_ID}
      - --issuer-node-id
      - ${IPARS_DATAPLANE_ISSUER_NODE_ID:?set IPARS_DATAPLANE_ISSUER_NODE_ID}
      - --issuer-key-id
      - root
      - --issuer-public-key
      - ${IPARS_DATAPLANE_ISSUER_PUBLIC_KEY:?set IPARS_DATAPLANE_ISSUER_PUBLIC_KEY}
    environment: !override
      IPARS_DATABASE_URL: postgres://ipars:ipars-dev@postgres:5432/ipars
      IPARS_ROLE: control-plane
    ports: !reset []
    secrets: !reset []

  signal:
    network_mode: service:control-plane
    environment: !override
      IPARS_ROLE: signal
      IPARS_SIGNAL_CONTROL_PLANE_URLS: http://127.0.0.1:8443
    ports: !reset []
    secrets: !reset []

  stun:
    network_mode: service:control-plane
    environment: !override
      IPARS_ROLE: stun
      IPARS_STUN_ALTERNATE_LISTEN: 0.0.0.0:3480
    ports: !reset []
    secrets: !reset []

  relay:
    cap_add: !reset []
    devices: !reset []
    ports: !reset []

  agent:
    network_mode: !reset null
    networks:
      - default
      - workload-a
    command:
      - agent
      - --listen
      - 0.0.0.0:9780
      - --state-path
      - /var/lib/ipars/agent.json
      - --apply-peer-map
      - --peer-map-poll-interval-seconds
      - "1"
      - --signal-path-interval-seconds
      - "1"
      - --heartbeat-interval-seconds
      - "1"
      - --stun-server
      - ${IPARS_DATAPLANE_BOOTSTRAP_IP:?set IPARS_DATAPLANE_BOOTSTRAP_IP}:3478
    environment: !override
      IPARS_ROLE: agent
      IPARS_AGENT_CONTROL_PLANE_URL: http://${IPARS_DATAPLANE_BOOTSTRAP_IP:?set IPARS_DATAPLANE_BOOTSTRAP_IP}:8443
      IPARS_AGENT_SIGNAL_URL: http://${IPARS_DATAPLANE_BOOTSTRAP_IP:?set IPARS_DATAPLANE_BOOTSTRAP_IP}:9443
      IPARS_AGENT_JOIN_TOKEN: ${IPARS_DATAPLANE_JOIN_TOKEN:?set IPARS_DATAPLANE_JOIN_TOKEN}
      IPARS_AGENT_API_BEARER_TOKEN: ${IPARS_DATAPLANE_AGENT_API_BEARER_TOKEN:?set IPARS_DATAPLANE_AGENT_API_BEARER_TOKEN}
      IPARS_AGENT_STUN_BIND: 0.0.0.0:51820
      IPARS_AGENT_WIREGUARD_LISTEN_PORT: "51820"
      IPARS_AGENT_RUNTIME_BACKEND: linux-command
      IPARS_AGENT_WIREGUARD_BACKEND: command
      IPARS_AGENT_ROUTE_BACKEND: command
      IPARS_AGENT_DISABLE_PEER_PROBE: "true"
      IPARS_AGENT_APPLY_DOCKER_ROUTES: "true"
      IPARS_DOCKER_DISCOVER_NETWORKS: "false"
      IPARS_DOCKER_CONTAINER_NAMESPACE: docker-workload-a
      IPARS_DOCKER_HOST_INTERFACE: eth1
      IPARS_DOCKER_CONTAINER_CIDRS: ${IPARS_DATAPLANE_WORKLOAD_A_CIDR:?set IPARS_DATAPLANE_WORKLOAD_A_CIDR}
      IPARS_DOCKER_EXPOSE_HOST_ROUTES: "true"
      IPARS_DOCKER_ROUTE_INTERVAL_SECONDS: "1"
    depends_on: !override
      control-plane:
        condition: service_healthy
      signal:
        condition: service_healthy
      stun:
        condition: service_healthy
    ports: !reset []
    cap_add: !override
      - NET_ADMIN
      - NET_RAW
    devices: !reset []
    secrets: !reset []
    sysctls:
      net.ipv4.ip_forward: "1"
    volumes: !override
      - agent-dataplane-a:/var/lib/ipars

  agent-b:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    networks:
      - default
      - workload-b
    command:
      - agent
      - --listen
      - 0.0.0.0:9780
      - --state-path
      - /var/lib/ipars/agent-b.json
      - --apply-peer-map
      - --peer-map-poll-interval-seconds
      - "1"
      - --signal-path-interval-seconds
      - "1"
      - --heartbeat-interval-seconds
      - "1"
      - --stun-server
      - ${IPARS_DATAPLANE_BOOTSTRAP_IP:?set IPARS_DATAPLANE_BOOTSTRAP_IP}:3478
    environment:
      IPARS_ROLE: agent
      IPARS_AGENT_CONTROL_PLANE_URL: http://${IPARS_DATAPLANE_BOOTSTRAP_IP:?set IPARS_DATAPLANE_BOOTSTRAP_IP}:8443
      IPARS_AGENT_SIGNAL_URL: http://${IPARS_DATAPLANE_BOOTSTRAP_IP:?set IPARS_DATAPLANE_BOOTSTRAP_IP}:9443
      IPARS_AGENT_JOIN_TOKEN: ${IPARS_DATAPLANE_JOIN_TOKEN:?set IPARS_DATAPLANE_JOIN_TOKEN}
      IPARS_AGENT_API_BEARER_TOKEN: ${IPARS_DATAPLANE_AGENT_API_BEARER_TOKEN:?set IPARS_DATAPLANE_AGENT_API_BEARER_TOKEN}
      IPARS_AGENT_STUN_BIND: 0.0.0.0:51820
      IPARS_AGENT_WIREGUARD_LISTEN_PORT: "51820"
      IPARS_AGENT_RUNTIME_BACKEND: linux-command
      IPARS_AGENT_WIREGUARD_BACKEND: command
      IPARS_AGENT_ROUTE_BACKEND: command
      IPARS_AGENT_DISABLE_PEER_PROBE: "true"
      IPARS_AGENT_APPLY_DOCKER_ROUTES: "true"
      IPARS_DOCKER_DISCOVER_NETWORKS: "false"
      IPARS_DOCKER_CONTAINER_NAMESPACE: docker-workload-b
      IPARS_DOCKER_HOST_INTERFACE: eth1
      IPARS_DOCKER_CONTAINER_CIDRS: ${IPARS_DATAPLANE_WORKLOAD_B_CIDR:?set IPARS_DATAPLANE_WORKLOAD_B_CIDR}
      IPARS_DOCKER_EXPOSE_HOST_ROUTES: "true"
      IPARS_DOCKER_ROUTE_INTERVAL_SECONDS: "1"
    depends_on:
      control-plane:
        condition: service_healthy
      signal:
        condition: service_healthy
      stun:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9780/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      net.ipv4.ip_forward: "1"
    volumes:
      - agent-dataplane-b:/var/lib/ipars

  workload-a:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - stun
      - --listen
      - 0.0.0.0:3478
      - --http-listen
      - 0.0.0.0:8080
    networks:
      - workload-a
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  workload-b:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - stun
      - --listen
      - 0.0.0.0:3478
      - --http-listen
      - 0.0.0.0:8080
    networks:
      - workload-b
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

networks:
  workload-a:
  workload-b:

volumes:
  agent-dataplane-a:
  agent-dataplane-b:
