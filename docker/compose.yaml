services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ipars
      POSTGRES_USER: ipars
      POSTGRES_PASSWORD: ipars-dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  control-plane:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command:
      - status
    environment:
      IPARS_DATABASE_URL: postgres://ipars:ipars-dev@postgres:5432/ipars
      IPARS_ROLE: control-plane
    ports:
      - "8443:8443"
    depends_on:
      - postgres

  signal:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command:
      - path
      - status
    environment:
      IPARS_ROLE: signal
    ports:
      - "9443:9443"

  stun:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command:
      - status
    environment:
      IPARS_ROLE: stun
    ports:
      - "3478:3478/udp"

  relay:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command:
      - relay
      - status
    environment:
      IPARS_ROLE: relay
      IPARS_RELAY_MAX_SESSIONS: "10000"
    ports:
      - "51820:51820/udp"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun

  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command:
      - status
    environment:
      IPARS_ROLE: agent
      IPARS_CONTROL_PLANE_URL: https://control-plane:8443
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun

volumes:
  postgres-data:
