services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: heteronetwork
      POSTGRES_USER: heteronetwork
      POSTGRES_PASSWORD: heteronetwork-dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heteronetwork -d heteronetwork"]
      interval: 10s
      timeout: 5s
      retries: 5

  control-plane:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - control-plane
      - --listen
      - 0.0.0.0:8443
      - --cluster-id
      - heteronetwork-dev
      - --issuer-node-id
      - node-dev-issuer
      - --issuer-key-id
      - root
      - --issuer-public-key
      - CHANGE_ME_BASE64_ED25519_PUBLIC_KEY
    environment:
      HETERONETWORK_DATABASE_URL: postgres://heteronetwork:heteronetwork-dev@postgres:5432/heteronetwork
      HETERONETWORK_ROLE: control-plane
      HETERONETWORK_CONTROL_PLANE_OPERATOR_API_BEARER_TOKEN_PATH: /run/secrets/heteronetwork-control-plane-operator-api-bearer-token
    ports:
      - "8443:8443"
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - heteronetwork-control-plane-operator-api-bearer-token
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8443/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  signal:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - signal
      - --listen
      - 0.0.0.0:9443
    environment:
      HETERONETWORK_ROLE: signal
      HETERONETWORK_SIGNAL_CONTROL_PLANE_URLS: http://control-plane:8443
      HETERONETWORK_SIGNAL_OPERATOR_API_BEARER_TOKEN_PATH: /run/secrets/heteronetwork-signal-operator-api-bearer-token
      HETERONETWORK_SIGNAL_PATH_QUALITY_OBSERVATION_TTL_SECONDS: ${HETERONETWORK_SIGNAL_PATH_QUALITY_OBSERVATION_TTL_SECONDS:-120}
    depends_on:
      control-plane:
        condition: service_healthy
    ports:
      - "9443:9443"
    secrets:
      - heteronetwork-signal-operator-api-bearer-token
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9443/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  stun:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - stun
      - --listen
      - 0.0.0.0:3478
      - --http-listen
      - 0.0.0.0:3479
    environment:
      HETERONETWORK_ROLE: stun
      HETERONETWORK_STUN_ALTERNATE_LISTEN: ${HETERONETWORK_STUN_ALTERNATE_LISTEN:-0.0.0.0:3480}
      HETERONETWORK_STUN_OPERATOR_API_BEARER_TOKEN_PATH: /run/secrets/heteronetwork-stun-operator-api-bearer-token
    ports:
      - "3478:3478/udp"
      - "3480:3480/udp"
      - "3479:3479"
    secrets:
      - heteronetwork-stun-operator-api-bearer-token
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3479/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  relay:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - relay
      - --relay-node-id
      - relay-dev
      - --udp-listen
      - 0.0.0.0:51820
      - --http-listen
      - 0.0.0.0:9580
    environment:
      - HETERONETWORK_ROLE=relay
      - HETERONETWORK_RELAY_PUBLIC_ENDPOINT=${HETERONETWORK_RELAY_PUBLIC_ENDPOINT:-127.0.0.1:51820}
      - HETERONETWORK_RELAY_ADMISSION_URL=${HETERONETWORK_RELAY_ADMISSION_URL:-http://127.0.0.1:9580}
      - HETERONETWORK_RELAY_MAX_SESSIONS=${HETERONETWORK_RELAY_MAX_SESSIONS:-10000}
      - HETERONETWORK_RELAY_MAX_SESSIONS_PER_NODE=${HETERONETWORK_RELAY_MAX_SESSIONS_PER_NODE:-0}
      - HETERONETWORK_RELAY_MAX_MBPS=${HETERONETWORK_RELAY_MAX_MBPS:-1000}
      - HETERONETWORK_RELAY_SESSION_TTL_SECONDS=${HETERONETWORK_RELAY_SESSION_TTL_SECONDS:-300}
      - HETERONETWORK_RELAY_ADMISSION_RATE_LIMIT=${HETERONETWORK_RELAY_ADMISSION_RATE_LIMIT:-4096}
      - HETERONETWORK_RELAY_ADMISSION_RATE_LIMIT_WINDOW_SECONDS=${HETERONETWORK_RELAY_ADMISSION_RATE_LIMIT_WINDOW_SECONDS:-60}
      - HETERONETWORK_RELAY_ADMISSION_BEARER_TOKEN_PATH=/run/secrets/heteronetwork-relay-admission-bearer-token
      - HETERONETWORK_RELAY_OPERATOR_API_BEARER_TOKEN_PATH=/run/secrets/heteronetwork-relay-operator-api-bearer-token
    ports:
      - "51820:51820/udp"
      - "9580:9580"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9580/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    secrets:
      - heteronetwork-relay-admission-bearer-token
      - heteronetwork-relay-operator-api-bearer-token

  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - agent
      - --listen
      - 0.0.0.0:9780
      - --state-path
      - /var/lib/heteronetwork/agent.json
      - --apply-peer-map
      - --stun-server
      - 127.0.0.1:3478
    environment:
      - HETERONETWORK_ROLE=agent
      - HETERONETWORK_AGENT_JOIN_TOKEN_PATH=/run/secrets/heteronetwork-agent-join-token
      - HETERONETWORK_AGENT_API_BEARER_TOKEN_PATH=/run/secrets/heteronetwork-agent-api-bearer-token
      - HETERONETWORK_AGENT_CONTROL_PLANE_URL=http://127.0.0.1:8443
      - HETERONETWORK_AGENT_SIGNAL_URL=http://127.0.0.1:9443
      - HETERONETWORK_AGENT_HTTP_CONNECT_TIMEOUT_SECONDS=${HETERONETWORK_AGENT_HTTP_CONNECT_TIMEOUT_SECONDS:-5}
      - HETERONETWORK_AGENT_HTTP_REQUEST_TIMEOUT_SECONDS=${HETERONETWORK_AGENT_HTTP_REQUEST_TIMEOUT_SECONDS:-30}
      - HETERONETWORK_AGENT_PEER_MAP_POLL_INTERVAL_SECONDS=${HETERONETWORK_AGENT_PEER_MAP_POLL_INTERVAL_SECONDS:-30}
      - HETERONETWORK_AGENT_SIGNAL_PATH_INTERVAL_SECONDS=${HETERONETWORK_AGENT_SIGNAL_PATH_INTERVAL_SECONDS:-30}
      - HETERONETWORK_AGENT_DIRECT_PATH_PROBE_TIMEOUT_SECONDS=${HETERONETWORK_AGENT_DIRECT_PATH_PROBE_TIMEOUT_SECONDS:-120}
      - HETERONETWORK_AGENT_DIRECT_HANDSHAKE_MAX_AGE_SECONDS=${HETERONETWORK_AGENT_DIRECT_HANDSHAKE_MAX_AGE_SECONDS:-180}
      - HETERONETWORK_AGENT_DISABLE_PEER_PROBE=${HETERONETWORK_AGENT_DISABLE_PEER_PROBE:-false}
      - HETERONETWORK_AGENT_PEER_PROBE_PORT=${HETERONETWORK_AGENT_PEER_PROBE_PORT:-51822}
      - HETERONETWORK_AGENT_PEER_PROBE_INTERVAL_SECONDS=${HETERONETWORK_AGENT_PEER_PROBE_INTERVAL_SECONDS:-30}
      - HETERONETWORK_AGENT_PEER_PROBE_SAMPLE_COUNT=${HETERONETWORK_AGENT_PEER_PROBE_SAMPLE_COUNT:-5}
      - HETERONETWORK_AGENT_PEER_PROBE_RESPONSE_TIMEOUT_MILLIS=${HETERONETWORK_AGENT_PEER_PROBE_RESPONSE_TIMEOUT_MILLIS:-500}
      - HETERONETWORK_AGENT_PEER_PROBE_SAMPLE_INTERVAL_MILLIS=${HETERONETWORK_AGENT_PEER_PROBE_SAMPLE_INTERVAL_MILLIS:-20}
      - HETERONETWORK_AGENT_PEER_PROBE_MAX_CONCURRENCY=${HETERONETWORK_AGENT_PEER_PROBE_MAX_CONCURRENCY:-32}
      - HETERONETWORK_AGENT_PEER_PROBE_RESPONDER_MAX_REQUESTS_PER_SECOND=${HETERONETWORK_AGENT_PEER_PROBE_RESPONDER_MAX_REQUESTS_PER_SECOND:-100}
      - HETERONETWORK_AGENT_PEER_PROBE_OBSERVATION_MAX_AGE_SECONDS=${HETERONETWORK_AGENT_PEER_PROBE_OBSERVATION_MAX_AGE_SECONDS:-120}
      - HETERONETWORK_AGENT_STUN_BIND=${HETERONETWORK_AGENT_STUN_BIND:-0.0.0.0:51821}
      - HETERONETWORK_AGENT_DISABLE_PUBLIC_STUN_FALLBACK=${HETERONETWORK_AGENT_DISABLE_PUBLIC_STUN_FALLBACK:-false}
      - HETERONETWORK_AGENT_NAT_DISCOVERY_INTERVAL_SECONDS=${HETERONETWORK_AGENT_NAT_DISCOVERY_INTERVAL_SECONDS:-60}
      - HETERONETWORK_AGENT_WIREGUARD_LISTEN_PORT=${HETERONETWORK_AGENT_WIREGUARD_LISTEN_PORT:-51821}
      - HETERONETWORK_AGENT_RUNTIME_BACKEND=${HETERONETWORK_AGENT_RUNTIME_BACKEND:-linux-command}
      - HETERONETWORK_AGENT_WIREGUARD_BACKEND=${HETERONETWORK_AGENT_WIREGUARD_BACKEND:-command}
      - HETERONETWORK_AGENT_ROUTE_BACKEND=${HETERONETWORK_AGENT_ROUTE_BACKEND:-command}
      - HETERONETWORK_AGENT_USERSPACE_WIREGUARD_COMMAND
      - HETERONETWORK_AGENT_USERSPACE_WIREGUARD_ARGS
      - HETERONETWORK_AGENT_USERSPACE_WIREGUARD_READY_TIMEOUT_SECONDS=${HETERONETWORK_AGENT_USERSPACE_WIREGUARD_READY_TIMEOUT_SECONDS:-10}
      - HETERONETWORK_AGENT_USERSPACE_WIREGUARD_SHUTDOWN_TIMEOUT_SECONDS=${HETERONETWORK_AGENT_USERSPACE_WIREGUARD_SHUTDOWN_TIMEOUT_SECONDS:-5}
      - HETERONETWORK_AGENT_APPLY_DOCKER_ROUTES=${HETERONETWORK_AGENT_APPLY_DOCKER_ROUTES:-false}
      - HETERONETWORK_DOCKER_DISCOVER_NETWORKS=${HETERONETWORK_DOCKER_DISCOVER_NETWORKS:-false}
      - HETERONETWORK_DOCKER_API_URL
      - HETERONETWORK_DOCKER_API_CA_CERT_PATH
      - HETERONETWORK_DOCKER_NETWORKS
      - HETERONETWORK_DOCKER_CONTAINER_NAMESPACE
      - HETERONETWORK_DOCKER_HOST_INTERFACE=${HETERONETWORK_DOCKER_HOST_INTERFACE:-docker0}
      - HETERONETWORK_DOCKER_CONTAINER_CIDRS
      - HETERONETWORK_DOCKER_EXPOSE_HOST_ROUTES=${HETERONETWORK_DOCKER_EXPOSE_HOST_ROUTES:-true}
      - HETERONETWORK_DOCKER_ROUTE_INTERVAL_SECONDS=${HETERONETWORK_DOCKER_ROUTE_INTERVAL_SECONDS:-60}
      - HETERONETWORK_AGENT_RELAY_PUBLIC_ENDPOINT=${HETERONETWORK_AGENT_RELAY_PUBLIC_ENDPOINT:-127.0.0.1:51820}
      - HETERONETWORK_AGENT_RELAY_ADMISSION_URL=${HETERONETWORK_AGENT_RELAY_ADMISSION_URL:-http://127.0.0.1:9580}
      - HETERONETWORK_AGENT_RELAY_STATUS_URL=${HETERONETWORK_AGENT_RELAY_STATUS_URL:-http://127.0.0.1:9580}
      - HETERONETWORK_AGENT_RELAY_MAX_SESSIONS=${HETERONETWORK_AGENT_RELAY_MAX_SESSIONS:-10000}
      - HETERONETWORK_AGENT_RELAY_MAX_MBPS=${HETERONETWORK_AGENT_RELAY_MAX_MBPS:-1000}
      - HETERONETWORK_AGENT_RELAY_ADMISSION_BEARER_TOKEN_PATH=/run/secrets/heteronetwork-relay-admission-bearer-token
      - HETERONETWORK_AGENT_RELAY_FORWARDER_ENDPOINT
      - HETERONETWORK_AGENT_RELAY_FORWARDER_BIND
      - HETERONETWORK_AGENT_RELAY_FORWARDER_WIREGUARD_ENDPOINT
      - HETERONETWORK_AGENT_RELAY_FORWARDER_NETNS
      - HETERONETWORK_AGENT_RELAY_FORWARDER_MAX_SESSIONS=${HETERONETWORK_AGENT_RELAY_FORWARDER_MAX_SESSIONS:-1024}
      - HETERONETWORK_AGENT_RELAY_FORWARDER_RESTART_BACKOFF_SECONDS=${HETERONETWORK_AGENT_RELAY_FORWARDER_RESTART_BACKOFF_SECONDS:-5}
      - HETERONETWORK_AGENT_RELAY_FORWARDER_CRASH_WINDOW_SECONDS=${HETERONETWORK_AGENT_RELAY_FORWARDER_CRASH_WINDOW_SECONDS:-60}
      - HETERONETWORK_AGENT_RELAY_FORWARDER_MAX_CRASHES_PER_WINDOW=${HETERONETWORK_AGENT_RELAY_FORWARDER_MAX_CRASHES_PER_WINDOW:-3}
      - HETERONETWORK_AGENT_RELAY_FORWARDER_CRASH_COOLDOWN_SECONDS=${HETERONETWORK_AGENT_RELAY_FORWARDER_CRASH_COOLDOWN_SECONDS:-60}
    depends_on:
      control-plane:
        condition: service_healthy
      signal:
        condition: service_healthy
      stun:
        condition: service_healthy
      relay:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9780/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    secrets:
      - heteronetwork-agent-join-token
      - heteronetwork-agent-api-bearer-token
      - heteronetwork-relay-admission-bearer-token
    volumes:
      - agent-data:/var/lib/heteronetwork

secrets:
  heteronetwork-control-plane-operator-api-bearer-token:
    file: ${HETERONETWORK_CONTROL_PLANE_OPERATOR_API_BEARER_TOKEN_FILE:-./control-plane-operator-api.token}
  heteronetwork-signal-operator-api-bearer-token:
    file: ${HETERONETWORK_SIGNAL_OPERATOR_API_BEARER_TOKEN_FILE:-./signal-operator-api.token}
  heteronetwork-stun-operator-api-bearer-token:
    file: ${HETERONETWORK_STUN_OPERATOR_API_BEARER_TOKEN_FILE:-./stun-operator-api.token}
  heteronetwork-relay-operator-api-bearer-token:
    file: ${HETERONETWORK_RELAY_OPERATOR_API_BEARER_TOKEN_FILE:-./relay-operator-api.token}
  heteronetwork-relay-admission-bearer-token:
    file: ${HETERONETWORK_RELAY_ADMISSION_BEARER_TOKEN_FILE:-./relay-admission.token}
  heteronetwork-agent-join-token:
    file: ./join.token
  heteronetwork-agent-api-bearer-token:
    file: ${HETERONETWORK_AGENT_API_BEARER_TOKEN_FILE:-./agent-api.token}

volumes:
  postgres-data:
  agent-data:
