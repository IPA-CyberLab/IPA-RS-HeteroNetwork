services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ipars
      POSTGRES_USER: ipars
      POSTGRES_PASSWORD: ipars-dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  control-plane:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - control-plane
      - --listen
      - 0.0.0.0:8443
      - --cluster-id
      - ipars-dev
      - --issuer-node-id
      - node-dev-issuer
      - --issuer-key-id
      - root
      - --issuer-public-key
      - CHANGE_ME_BASE64_ED25519_PUBLIC_KEY
    environment:
      IPARS_DATABASE_URL: postgres://ipars:ipars-dev@postgres:5432/ipars
      IPARS_ROLE: control-plane
    ports:
      - "8443:8443"
    depends_on:
      - postgres

  signal:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - signal
      - --listen
      - 0.0.0.0:9443
    environment:
      IPARS_ROLE: signal
    ports:
      - "9443:9443"

  stun:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - stun
      - --listen
      - 0.0.0.0:3478
    environment:
      IPARS_ROLE: stun
    ports:
      - "3478:3478/udp"

  relay:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - relay
      - --relay-node-id
      - relay-dev
      - --udp-listen
      - 0.0.0.0:51820
      - --http-listen
      - 0.0.0.0:9580
    environment:
      IPARS_ROLE: relay
      IPARS_RELAY_ADMISSION_URL: http://relay:9580
      IPARS_RELAY_MAX_SESSIONS: "10000"
    ports:
      - "51820:51820/udp"
      - "9580:9580"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun

  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - agent
      - --listen
      - 0.0.0.0:9780
      - --state-path
      - /var/lib/ipars/agent.json
      - --stun-server
      - 127.0.0.1:3478
    environment:
      IPARS_ROLE: agent
      IPARS_CONTROL_PLANE_URL: http://control-plane:8443
      IPARS_AGENT_APPLY_DOCKER_ROUTES: "true"
      IPARS_DOCKER_CONTAINER_NAMESPACE: compose-default
      IPARS_DOCKER_HOST_INTERFACE: docker0
      IPARS_DOCKER_CONTAINER_CIDRS: 172.18.0.0/16
      IPARS_DOCKER_EXPOSE_HOST_ROUTES: "true"
      IPARS_DOCKER_ROUTE_INTERVAL_SECONDS: "60"
      IPARS_AGENT_RELAY_PUBLIC_ENDPOINT: 127.0.0.1:51820
      IPARS_AGENT_RELAY_ADMISSION_URL: http://127.0.0.1:9580
      IPARS_AGENT_RELAY_STATUS_URL: http://127.0.0.1:9580
      IPARS_AGENT_RELAY_MAX_SESSIONS: "10000"
      IPARS_AGENT_RELAY_MAX_MBPS: "1000"
      IPARS_AGENT_RELAY_FORWARDER_MAX_SESSIONS: "1024"
      IPARS_AGENT_RELAY_FORWARDER_RESTART_BACKOFF_SECONDS: "5"
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - agent-data:/var/lib/ipars

volumes:
  postgres-data:
  agent-data:
