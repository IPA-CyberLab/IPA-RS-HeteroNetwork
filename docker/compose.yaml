services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ipars
      POSTGRES_USER: ipars
      POSTGRES_PASSWORD: ipars-dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipars -d ipars"]
      interval: 10s
      timeout: 5s
      retries: 5

  control-plane:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - control-plane
      - --listen
      - 0.0.0.0:8443
      - --cluster-id
      - ipars-dev
      - --issuer-node-id
      - node-dev-issuer
      - --issuer-key-id
      - root
      - --issuer-public-key
      - CHANGE_ME_BASE64_ED25519_PUBLIC_KEY
    environment:
      IPARS_DATABASE_URL: postgres://ipars:ipars-dev@postgres:5432/ipars
      IPARS_ROLE: control-plane
    ports:
      - "8443:8443"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8443/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  signal:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - signal
      - --listen
      - 0.0.0.0:9443
    environment:
      IPARS_ROLE: signal
    ports:
      - "9443:9443"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9443/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  stun:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - stun
      - --listen
      - 0.0.0.0:3478
      - --http-listen
      - 0.0.0.0:3479
    environment:
      IPARS_ROLE: stun
      IPARS_STUN_ALTERNATE_LISTEN: ${IPARS_STUN_ALTERNATE_LISTEN:-0.0.0.0:3480}
    ports:
      - "3478:3478/udp"
      - "3480:3480/udp"
      - "3479:3479"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3479/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  relay:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - relay
      - --relay-node-id
      - relay-dev
      - --udp-listen
      - 0.0.0.0:51820
      - --http-listen
      - 0.0.0.0:9580
    environment:
      - IPARS_ROLE=relay
      - IPARS_RELAY_PUBLIC_ENDPOINT=${IPARS_RELAY_PUBLIC_ENDPOINT:-127.0.0.1:51820}
      - IPARS_RELAY_ADMISSION_URL=${IPARS_RELAY_ADMISSION_URL:-http://127.0.0.1:9580}
      - IPARS_RELAY_MAX_SESSIONS=${IPARS_RELAY_MAX_SESSIONS:-10000}
      - IPARS_RELAY_MAX_SESSIONS_PER_NODE=${IPARS_RELAY_MAX_SESSIONS_PER_NODE:-0}
      - IPARS_RELAY_MAX_MBPS=${IPARS_RELAY_MAX_MBPS:-1000}
      - IPARS_RELAY_SESSION_TTL_SECONDS=${IPARS_RELAY_SESSION_TTL_SECONDS:-300}
      - IPARS_RELAY_ADMISSION_RATE_LIMIT=${IPARS_RELAY_ADMISSION_RATE_LIMIT:-4096}
      - IPARS_RELAY_ADMISSION_RATE_LIMIT_WINDOW_SECONDS=${IPARS_RELAY_ADMISSION_RATE_LIMIT_WINDOW_SECONDS:-60}
      - IPARS_RELAY_ADMISSION_BEARER_TOKEN
    ports:
      - "51820:51820/udp"
      - "9580:9580"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9580/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun

  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - agent
      - --listen
      - 0.0.0.0:9780
      - --state-path
      - /var/lib/ipars/agent.json
      - --stun-server
      - 127.0.0.1:3478
    environment:
      - IPARS_ROLE=agent
      - IPARS_AGENT_JOIN_TOKEN_PATH=/run/secrets/ipars-agent-join-token
      - IPARS_AGENT_CONTROL_PLANE_URL=http://127.0.0.1:8443
      - IPARS_AGENT_SIGNAL_URL=http://127.0.0.1:9443
      - IPARS_AGENT_RUNTIME_BACKEND=${IPARS_AGENT_RUNTIME_BACKEND:-linux-command}
      - IPARS_AGENT_WIREGUARD_BACKEND=${IPARS_AGENT_WIREGUARD_BACKEND:-command}
      - IPARS_AGENT_ROUTE_BACKEND=${IPARS_AGENT_ROUTE_BACKEND:-command}
      - IPARS_AGENT_USERSPACE_WIREGUARD_COMMAND
      - IPARS_AGENT_USERSPACE_WIREGUARD_ARGS
      - IPARS_AGENT_USERSPACE_WIREGUARD_READY_TIMEOUT_SECONDS=${IPARS_AGENT_USERSPACE_WIREGUARD_READY_TIMEOUT_SECONDS:-10}
      - IPARS_AGENT_USERSPACE_WIREGUARD_SHUTDOWN_TIMEOUT_SECONDS=${IPARS_AGENT_USERSPACE_WIREGUARD_SHUTDOWN_TIMEOUT_SECONDS:-5}
      - IPARS_AGENT_APPLY_DOCKER_ROUTES=${IPARS_AGENT_APPLY_DOCKER_ROUTES:-false}
      - IPARS_DOCKER_DISCOVER_NETWORKS=${IPARS_DOCKER_DISCOVER_NETWORKS:-false}
      - IPARS_DOCKER_NETWORKS
      - IPARS_DOCKER_CONTAINER_NAMESPACE
      - IPARS_DOCKER_HOST_INTERFACE=${IPARS_DOCKER_HOST_INTERFACE:-docker0}
      - IPARS_DOCKER_CONTAINER_CIDRS
      - IPARS_DOCKER_EXPOSE_HOST_ROUTES=${IPARS_DOCKER_EXPOSE_HOST_ROUTES:-true}
      - IPARS_DOCKER_ROUTE_INTERVAL_SECONDS=${IPARS_DOCKER_ROUTE_INTERVAL_SECONDS:-60}
      - IPARS_AGENT_RELAY_PUBLIC_ENDPOINT=${IPARS_AGENT_RELAY_PUBLIC_ENDPOINT:-127.0.0.1:51820}
      - IPARS_AGENT_RELAY_ADMISSION_URL=${IPARS_AGENT_RELAY_ADMISSION_URL:-http://127.0.0.1:9580}
      - IPARS_AGENT_RELAY_STATUS_URL=${IPARS_AGENT_RELAY_STATUS_URL:-http://127.0.0.1:9580}
      - IPARS_AGENT_RELAY_MAX_SESSIONS=${IPARS_AGENT_RELAY_MAX_SESSIONS:-10000}
      - IPARS_AGENT_RELAY_MAX_MBPS=${IPARS_AGENT_RELAY_MAX_MBPS:-1000}
      - IPARS_AGENT_RELAY_ADMISSION_BEARER_TOKEN
      - IPARS_AGENT_RELAY_FORWARDER_ENDPOINT
      - IPARS_AGENT_RELAY_FORWARDER_BIND
      - IPARS_AGENT_RELAY_FORWARDER_WIREGUARD_ENDPOINT
      - IPARS_AGENT_RELAY_FORWARDER_NETNS
      - IPARS_AGENT_RELAY_FORWARDER_MAX_SESSIONS=${IPARS_AGENT_RELAY_FORWARDER_MAX_SESSIONS:-1024}
      - IPARS_AGENT_RELAY_FORWARDER_RESTART_BACKOFF_SECONDS=${IPARS_AGENT_RELAY_FORWARDER_RESTART_BACKOFF_SECONDS:-5}
      - IPARS_AGENT_RELAY_FORWARDER_CRASH_WINDOW_SECONDS=${IPARS_AGENT_RELAY_FORWARDER_CRASH_WINDOW_SECONDS:-60}
      - IPARS_AGENT_RELAY_FORWARDER_MAX_CRASHES_PER_WINDOW=${IPARS_AGENT_RELAY_FORWARDER_MAX_CRASHES_PER_WINDOW:-3}
      - IPARS_AGENT_RELAY_FORWARDER_CRASH_COOLDOWN_SECONDS=${IPARS_AGENT_RELAY_FORWARDER_CRASH_COOLDOWN_SECONDS:-60}
    depends_on:
      control-plane:
        condition: service_healthy
      signal:
        condition: service_healthy
      stun:
        condition: service_healthy
      relay:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9780/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    secrets:
      - ipars-agent-join-token
    volumes:
      - agent-data:/var/lib/ipars

secrets:
  ipars-agent-join-token:
    file: ./join.token

volumes:
  postgres-data:
  agent-data:
