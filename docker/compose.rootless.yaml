services:
  control-plane:
    build:
      network: host

  signal:
    build:
      network: host

  stun:
    build:
      network: host

  relay:
    build:
      network: host
    cap_add: !reset []
    devices: !reset []

  agent:
    build:
      network: host
    cap_add: !reset []
    devices: !reset []
    environment: !override
      - HETERONETWORK_ROLE=agent
      - HETERONETWORK_AGENT_JOIN_TOKEN_PATH=/run/secrets/heteronetwork-agent-join-token
      - HETERONETWORK_AGENT_API_BEARER_TOKEN_PATH=/run/secrets/heteronetwork-agent-api-bearer-token
      - HETERONETWORK_AGENT_CONTROL_PLANE_URL=http://127.0.0.1:8443
      - HETERONETWORK_AGENT_SIGNAL_URL=http://127.0.0.1:9443
      - HETERONETWORK_AGENT_HTTP_CONNECT_TIMEOUT_SECONDS=${HETERONETWORK_AGENT_HTTP_CONNECT_TIMEOUT_SECONDS:-5}
      - HETERONETWORK_AGENT_HTTP_REQUEST_TIMEOUT_SECONDS=${HETERONETWORK_AGENT_HTTP_REQUEST_TIMEOUT_SECONDS:-30}
      - HETERONETWORK_AGENT_PEER_MAP_POLL_INTERVAL_SECONDS=${HETERONETWORK_AGENT_PEER_MAP_POLL_INTERVAL_SECONDS:-30}
      - HETERONETWORK_AGENT_SIGNAL_PATH_INTERVAL_SECONDS=${HETERONETWORK_AGENT_SIGNAL_PATH_INTERVAL_SECONDS:-30}
      - HETERONETWORK_AGENT_DIRECT_PATH_PROBE_TIMEOUT_SECONDS=${HETERONETWORK_AGENT_DIRECT_PATH_PROBE_TIMEOUT_SECONDS:-120}
      - HETERONETWORK_AGENT_DIRECT_HANDSHAKE_MAX_AGE_SECONDS=${HETERONETWORK_AGENT_DIRECT_HANDSHAKE_MAX_AGE_SECONDS:-180}
      - HETERONETWORK_AGENT_DISABLE_PEER_PROBE=true
      - HETERONETWORK_AGENT_PEER_PROBE_PORT=${HETERONETWORK_AGENT_PEER_PROBE_PORT:-51822}
      - HETERONETWORK_AGENT_PEER_PROBE_INTERVAL_SECONDS=${HETERONETWORK_AGENT_PEER_PROBE_INTERVAL_SECONDS:-30}
      - HETERONETWORK_AGENT_PEER_PROBE_SAMPLE_COUNT=${HETERONETWORK_AGENT_PEER_PROBE_SAMPLE_COUNT:-5}
      - HETERONETWORK_AGENT_PEER_PROBE_RESPONSE_TIMEOUT_MILLIS=${HETERONETWORK_AGENT_PEER_PROBE_RESPONSE_TIMEOUT_MILLIS:-500}
      - HETERONETWORK_AGENT_PEER_PROBE_SAMPLE_INTERVAL_MILLIS=${HETERONETWORK_AGENT_PEER_PROBE_SAMPLE_INTERVAL_MILLIS:-20}
      - HETERONETWORK_AGENT_PEER_PROBE_MAX_CONCURRENCY=${HETERONETWORK_AGENT_PEER_PROBE_MAX_CONCURRENCY:-32}
      - HETERONETWORK_AGENT_PEER_PROBE_RESPONDER_MAX_REQUESTS_PER_SECOND=${HETERONETWORK_AGENT_PEER_PROBE_RESPONDER_MAX_REQUESTS_PER_SECOND:-100}
      - HETERONETWORK_AGENT_PEER_PROBE_OBSERVATION_MAX_AGE_SECONDS=${HETERONETWORK_AGENT_PEER_PROBE_OBSERVATION_MAX_AGE_SECONDS:-120}
      - HETERONETWORK_AGENT_STUN_BIND=${HETERONETWORK_AGENT_STUN_BIND:-0.0.0.0:51821}
      - HETERONETWORK_AGENT_DISABLE_PUBLIC_STUN_FALLBACK=${HETERONETWORK_AGENT_DISABLE_PUBLIC_STUN_FALLBACK:-true}
      - HETERONETWORK_AGENT_NAT_DISCOVERY_INTERVAL_SECONDS=${HETERONETWORK_AGENT_NAT_DISCOVERY_INTERVAL_SECONDS:-60}
      - HETERONETWORK_AGENT_WIREGUARD_LISTEN_PORT=${HETERONETWORK_AGENT_WIREGUARD_LISTEN_PORT:-51821}
      - HETERONETWORK_AGENT_RUNTIME_BACKEND=dry-run
      - HETERONETWORK_AGENT_WIREGUARD_BACKEND=command
      - HETERONETWORK_AGENT_ROUTE_BACKEND=command
      - HETERONETWORK_AGENT_APPLY_DOCKER_ROUTES=false
      - HETERONETWORK_DOCKER_DISCOVER_NETWORKS=false
      - HETERONETWORK_DOCKER_API_URL
      - HETERONETWORK_DOCKER_API_CA_CERT_PATH
      - HETERONETWORK_AGENT_RELAY_PUBLIC_ENDPOINT=${HETERONETWORK_AGENT_RELAY_PUBLIC_ENDPOINT:-127.0.0.1:51820}
      - HETERONETWORK_AGENT_RELAY_ADMISSION_URL=${HETERONETWORK_AGENT_RELAY_ADMISSION_URL:-http://127.0.0.1:9580}
      - HETERONETWORK_AGENT_RELAY_STATUS_URL=${HETERONETWORK_AGENT_RELAY_STATUS_URL:-http://127.0.0.1:9580}
      - HETERONETWORK_AGENT_RELAY_MAX_SESSIONS=${HETERONETWORK_AGENT_RELAY_MAX_SESSIONS:-10000}
      - HETERONETWORK_AGENT_RELAY_MAX_MBPS=${HETERONETWORK_AGENT_RELAY_MAX_MBPS:-1000}
      - HETERONETWORK_AGENT_RELAY_ADMISSION_BEARER_TOKEN_PATH=/run/secrets/heteronetwork-relay-admission-bearer-token
