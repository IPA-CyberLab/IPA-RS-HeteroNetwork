services:
  control-plane:
    build:
      network: host

  signal:
    build:
      network: host

  stun:
    build:
      network: host

  relay:
    build:
      network: host
    cap_add: !reset []
    devices: !reset []

  agent:
    build:
      network: host
    cap_add: !reset []
    devices: !reset []
    environment: !override
      - IPARS_ROLE=agent
      - IPARS_AGENT_JOIN_TOKEN_PATH=/run/secrets/ipars-agent-join-token
      - IPARS_AGENT_API_BEARER_TOKEN_PATH=/run/secrets/ipars-agent-api-bearer-token
      - IPARS_AGENT_CONTROL_PLANE_URL=http://127.0.0.1:8443
      - IPARS_AGENT_SIGNAL_URL=http://127.0.0.1:9443
      - IPARS_AGENT_HTTP_CONNECT_TIMEOUT_SECONDS=${IPARS_AGENT_HTTP_CONNECT_TIMEOUT_SECONDS:-5}
      - IPARS_AGENT_HTTP_REQUEST_TIMEOUT_SECONDS=${IPARS_AGENT_HTTP_REQUEST_TIMEOUT_SECONDS:-30}
      - IPARS_AGENT_PEER_MAP_POLL_INTERVAL_SECONDS=${IPARS_AGENT_PEER_MAP_POLL_INTERVAL_SECONDS:-30}
      - IPARS_AGENT_SIGNAL_PATH_INTERVAL_SECONDS=${IPARS_AGENT_SIGNAL_PATH_INTERVAL_SECONDS:-30}
      - IPARS_AGENT_DIRECT_PATH_PROBE_TIMEOUT_SECONDS=${IPARS_AGENT_DIRECT_PATH_PROBE_TIMEOUT_SECONDS:-120}
      - IPARS_AGENT_DIRECT_HANDSHAKE_MAX_AGE_SECONDS=${IPARS_AGENT_DIRECT_HANDSHAKE_MAX_AGE_SECONDS:-180}
      - IPARS_AGENT_DISABLE_PEER_PROBE=true
      - IPARS_AGENT_PEER_PROBE_PORT=${IPARS_AGENT_PEER_PROBE_PORT:-51822}
      - IPARS_AGENT_PEER_PROBE_INTERVAL_SECONDS=${IPARS_AGENT_PEER_PROBE_INTERVAL_SECONDS:-30}
      - IPARS_AGENT_PEER_PROBE_SAMPLE_COUNT=${IPARS_AGENT_PEER_PROBE_SAMPLE_COUNT:-5}
      - IPARS_AGENT_PEER_PROBE_RESPONSE_TIMEOUT_MILLIS=${IPARS_AGENT_PEER_PROBE_RESPONSE_TIMEOUT_MILLIS:-500}
      - IPARS_AGENT_PEER_PROBE_SAMPLE_INTERVAL_MILLIS=${IPARS_AGENT_PEER_PROBE_SAMPLE_INTERVAL_MILLIS:-20}
      - IPARS_AGENT_PEER_PROBE_MAX_CONCURRENCY=${IPARS_AGENT_PEER_PROBE_MAX_CONCURRENCY:-32}
      - IPARS_AGENT_PEER_PROBE_RESPONDER_MAX_REQUESTS_PER_SECOND=${IPARS_AGENT_PEER_PROBE_RESPONDER_MAX_REQUESTS_PER_SECOND:-100}
      - IPARS_AGENT_PEER_PROBE_OBSERVATION_MAX_AGE_SECONDS=${IPARS_AGENT_PEER_PROBE_OBSERVATION_MAX_AGE_SECONDS:-120}
      - IPARS_AGENT_STUN_BIND=${IPARS_AGENT_STUN_BIND:-0.0.0.0:51821}
      - IPARS_AGENT_WIREGUARD_LISTEN_PORT=${IPARS_AGENT_WIREGUARD_LISTEN_PORT:-51821}
      - IPARS_AGENT_RUNTIME_BACKEND=dry-run
      - IPARS_AGENT_WIREGUARD_BACKEND=command
      - IPARS_AGENT_ROUTE_BACKEND=command
      - IPARS_AGENT_APPLY_DOCKER_ROUTES=false
      - IPARS_DOCKER_DISCOVER_NETWORKS=false
      - IPARS_AGENT_RELAY_PUBLIC_ENDPOINT=${IPARS_AGENT_RELAY_PUBLIC_ENDPOINT:-127.0.0.1:51820}
      - IPARS_AGENT_RELAY_ADMISSION_URL=${IPARS_AGENT_RELAY_ADMISSION_URL:-http://127.0.0.1:9580}
      - IPARS_AGENT_RELAY_STATUS_URL=${IPARS_AGENT_RELAY_STATUS_URL:-http://127.0.0.1:9580}
      - IPARS_AGENT_RELAY_MAX_SESSIONS=${IPARS_AGENT_RELAY_MAX_SESSIONS:-10000}
      - IPARS_AGENT_RELAY_MAX_MBPS=${IPARS_AGENT_RELAY_MAX_MBPS:-1000}
      - IPARS_AGENT_RELAY_ADMISSION_BEARER_TOKEN_PATH=/run/secrets/ipars-relay-admission-bearer-token
