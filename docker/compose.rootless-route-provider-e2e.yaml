services:
  agent:
    image: ${HETERONETWORK_ROOTLESS_E2E_IMAGE:-heteronetwork-rootless-route-provider-e2e:local}
    networks: !override
      default:
        ipv4_address: 172.30.250.11
      workload-a:
        ipv4_address: 172.30.251.2
    environment: !override
      HETERONETWORK_ROLE: agent
      HETERONETWORK_AGENT_JOIN_TOKEN_PATH: /run/secrets/heteronetwork-agent-join-token
      HETERONETWORK_AGENT_API_BEARER_TOKEN_PATH: /run/secrets/heteronetwork-agent-api-bearer-token
      HETERONETWORK_AGENT_CONTROL_PLANE_URL: http://172.30.250.3:8443
      HETERONETWORK_AGENT_SIGNAL_URL: http://172.30.250.4:9443
      HETERONETWORK_AGENT_STUN_BIND: 0.0.0.0:51821
      HETERONETWORK_AGENT_DISABLE_PUBLIC_STUN_FALLBACK: "true"
      HETERONETWORK_AGENT_WIREGUARD_LISTEN_PORT: "51821"
      HETERONETWORK_AGENT_RUNTIME_BACKEND: linux-command
      HETERONETWORK_AGENT_WIREGUARD_BACKEND: userspace-boringtun
      HETERONETWORK_AGENT_ROUTE_BACKEND: command
      HETERONETWORK_AGENT_DISABLE_PEER_PROBE: "true"
      HETERONETWORK_AGENT_DIRECT_PATH_PROBE_TIMEOUT_SECONDS: "30"
      HETERONETWORK_AGENT_DIRECT_HANDSHAKE_MAX_AGE_SECONDS: "180"
      HETERONETWORK_AGENT_APPLY_DOCKER_ROUTES: "true"
      HETERONETWORK_DOCKER_DISCOVER_NETWORKS: "false"
      HETERONETWORK_DOCKER_CONTAINER_NAMESPACE: rootless-workload-a
      HETERONETWORK_DOCKER_CONTAINER_CIDRS: 172.30.251.0/24
      HETERONETWORK_DOCKER_HOST_INTERFACE: eth0
      HETERONETWORK_DOCKER_EXPOSE_HOST_ROUTES: "true"
      HETERONETWORK_DOCKER_ROUTE_INTERVAL_SECONDS: "1"
    volumes: !override
      - rootless-agent-a:/var/lib/heteronetwork
    secrets: !override
      - heteronetwork-agent-join-token
      - heteronetwork-agent-api-bearer-token

  agent-b:
    image: ${HETERONETWORK_ROOTLESS_E2E_IMAGE:-heteronetwork-rootless-route-provider-e2e:local}
    build: !reset null
    pull_policy: never
    networks: !override
      default:
        ipv4_address: 172.30.250.12
      workload-b:
        ipv4_address: 172.30.252.2
    environment: !override
      HETERONETWORK_ROLE: agent
      HETERONETWORK_AGENT_JOIN_TOKEN_PATH: /run/secrets/heteronetwork-agent-join-token
      HETERONETWORK_AGENT_API_BEARER_TOKEN_PATH: /run/secrets/heteronetwork-agent-api-bearer-token
      HETERONETWORK_AGENT_CONTROL_PLANE_URL: http://172.30.250.3:8443
      HETERONETWORK_AGENT_SIGNAL_URL: http://172.30.250.4:9443
      HETERONETWORK_AGENT_STUN_BIND: 0.0.0.0:51821
      HETERONETWORK_AGENT_DISABLE_PUBLIC_STUN_FALLBACK: "true"
      HETERONETWORK_AGENT_WIREGUARD_LISTEN_PORT: "51821"
      HETERONETWORK_AGENT_RUNTIME_BACKEND: linux-command
      HETERONETWORK_AGENT_WIREGUARD_BACKEND: userspace-boringtun
      HETERONETWORK_AGENT_ROUTE_BACKEND: command
      HETERONETWORK_AGENT_DISABLE_PEER_PROBE: "true"
      HETERONETWORK_AGENT_DIRECT_PATH_PROBE_TIMEOUT_SECONDS: "30"
      HETERONETWORK_AGENT_DIRECT_HANDSHAKE_MAX_AGE_SECONDS: "180"
      HETERONETWORK_AGENT_APPLY_DOCKER_ROUTES: "true"
      HETERONETWORK_DOCKER_DISCOVER_NETWORKS: "false"
      HETERONETWORK_DOCKER_CONTAINER_NAMESPACE: rootless-workload-b
      HETERONETWORK_DOCKER_CONTAINER_CIDRS: 172.30.252.0/24
      HETERONETWORK_DOCKER_HOST_INTERFACE: eth0
      HETERONETWORK_DOCKER_EXPOSE_HOST_ROUTES: "true"
      HETERONETWORK_DOCKER_ROUTE_INTERVAL_SECONDS: "1"
    volumes: !override
      - rootless-agent-b:/var/lib/heteronetwork
    secrets: !override
      - heteronetwork-agent-join-token
      - heteronetwork-agent-api-bearer-token

  workload-a:
    image: ${HETERONETWORK_ROOTLESS_E2E_IMAGE:-heteronetwork-rootless-route-provider-e2e:local}
    build: !reset null
    pull_policy: never
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - stun
      - --listen
      - 0.0.0.0:3478
      - --http-listen
      - 0.0.0.0:8080
    networks: !override
      workload-a:
        ipv4_address: 172.30.251.3
    ports:
      - "${HETERONETWORK_ROOTLESS_WORKLOAD_A_HTTP_PORT:-18080}:8080/tcp"
    depends_on:
      agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  workload-b:
    image: ${HETERONETWORK_ROOTLESS_E2E_IMAGE:-heteronetwork-rootless-route-provider-e2e:local}
    build: !reset null
    pull_policy: never
    entrypoint:
      - /usr/local/bin/iparsd
    command:
      - stun
      - --listen
      - 0.0.0.0:3478
      - --http-listen
      - 0.0.0.0:8080
    networks: !override
      workload-b:
        ipv4_address: 172.30.252.3
    ports:
      - "${HETERONETWORK_ROOTLESS_WORKLOAD_B_HTTP_PORT:-18081}:8080/tcp"
    depends_on:
      agent-b:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

networks:
  workload-a:
    ipam:
      config:
        - subnet: 172.30.251.0/24
  workload-b:
    ipam:
      config:
        - subnet: 172.30.252.0/24

volumes:
  rootless-agent-a:
  rootless-agent-b:
