services:
  agent:
    # The workload services share this namespace; routes applied by the agent
    # are therefore visible to the workload processes without Docker API or
    # iptables mutation.
    network_mode: !reset null
    command: !override
      - agent
      - --listen
      - 0.0.0.0:9780
      - --state-path
      - /var/lib/ipars/agent.json
      - --apply-peer-map
      - --stun-server
      - ${IPARS_ROOTLESS_STUN_SERVER:-127.0.0.1:3478}
    environment:
      - IPARS_AGENT_ROUTE_BACKEND=${IPARS_AGENT_ROUTE_BACKEND:-command}
      - IPARS_AGENT_APPLY_DOCKER_ROUTES=${IPARS_AGENT_APPLY_DOCKER_ROUTES:-true}
      - IPARS_DOCKER_DISCOVER_NETWORKS=${IPARS_DOCKER_DISCOVER_NETWORKS:-false}
      - IPARS_DOCKER_API_URL
      - IPARS_DOCKER_API_CA_CERT_PATH
      - IPARS_DOCKER_NETWORKS
      - IPARS_DOCKER_CONTAINER_NAMESPACE
      - IPARS_DOCKER_HOST_INTERFACE=${IPARS_DOCKER_HOST_INTERFACE:-docker0}
      - IPARS_DOCKER_CONTAINER_CIDRS
      - IPARS_DOCKER_EXPOSE_HOST_ROUTES=${IPARS_DOCKER_EXPOSE_HOST_ROUTES:-true}
      - IPARS_DOCKER_ROUTE_INTERVAL_SECONDS=${IPARS_DOCKER_ROUTE_INTERVAL_SECONDS:-60}
      - IPARS_AGENT_CONTROL_PLANE_URL=${IPARS_ROOTLESS_CONTROL_PLANE_URL:-http://control-plane:8443}
      - IPARS_AGENT_SIGNAL_URL=${IPARS_ROOTLESS_SIGNAL_URL:-http://signal:9443}
      - IPARS_AGENT_RELAY_ADMISSION_URL=${IPARS_AGENT_RELAY_ADMISSION_URL:-http://relay:9580}
      - IPARS_AGENT_RELAY_STATUS_URL=${IPARS_AGENT_RELAY_STATUS_URL:-http://relay:9580}
      - IPARS_AGENT_RELAY_PUBLIC_ENDPOINT=${IPARS_AGENT_RELAY_PUBLIC_ENDPOINT:-172.31.254.5:51820}
    ports: !override
      - "${IPARS_ROOTLESS_AGENT_HTTP_PORT:-9780}:9780"
      - "${IPARS_ROOTLESS_STUN_UDP_PORT:-3478}:3478/udp"
      - "${IPARS_ROOTLESS_STUN_ALTERNATE_UDP_PORT:-3480}:3480/udp"
      - "${IPARS_ROOTLESS_STUN_HTTP_PORT:-3479}:3479"
    depends_on: !override
      control-plane:
        condition: service_healthy
      signal:
        condition: service_healthy
      relay:
        condition: service_healthy
    networks: !override
      default: {}
      workload: {}

  relay:
    networks:
      default:
        ipv4_address: ${IPARS_ROOTLESS_RELAY_ADDRESS:-172.31.254.5}

  stun:
    network_mode: service:agent
    ports: !reset []
    depends_on:
      agent:
        condition: service_started

networks:
  default:
    ipam:
      config:
        - subnet: ${IPARS_ROOTLESS_DEFAULT_NETWORK_SUBNET:-172.31.254.0/24}
  workload:
    name: ${IPARS_ROOTLESS_WORKLOAD_NETWORK:?set IPARS_ROOTLESS_WORKLOAD_NETWORK}
    external: true
