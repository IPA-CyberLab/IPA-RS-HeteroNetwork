services:
  agent:
    # The workload services share this namespace; routes applied by the agent
    # are therefore visible to the workload processes without Docker API or
    # iptables mutation.
    network_mode: !reset null
    command: !override
      - agent
      - --listen
      - 0.0.0.0:9780
      - --state-path
      - /var/lib/heteronetwork/agent.json
      - --apply-peer-map
      - --stun-server
      - ${HETERONETWORK_ROOTLESS_STUN_SERVER:-127.0.0.1:3478}
    environment:
      - HETERONETWORK_AGENT_ROUTE_BACKEND=${HETERONETWORK_AGENT_ROUTE_BACKEND:-command}
      - HETERONETWORK_AGENT_APPLY_DOCKER_ROUTES=${HETERONETWORK_AGENT_APPLY_DOCKER_ROUTES:-true}
      - HETERONETWORK_DOCKER_DISCOVER_NETWORKS=${HETERONETWORK_DOCKER_DISCOVER_NETWORKS:-false}
      - HETERONETWORK_DOCKER_API_URL
      - HETERONETWORK_DOCKER_API_CA_CERT_PATH
      - HETERONETWORK_DOCKER_NETWORKS
      - HETERONETWORK_DOCKER_CONTAINER_NAMESPACE
      - HETERONETWORK_DOCKER_HOST_INTERFACE=${HETERONETWORK_DOCKER_HOST_INTERFACE:-docker0}
      - HETERONETWORK_DOCKER_CONTAINER_CIDRS
      - HETERONETWORK_DOCKER_EXPOSE_HOST_ROUTES=${HETERONETWORK_DOCKER_EXPOSE_HOST_ROUTES:-true}
      - HETERONETWORK_DOCKER_ROUTE_INTERVAL_SECONDS=${HETERONETWORK_DOCKER_ROUTE_INTERVAL_SECONDS:-60}
      - HETERONETWORK_AGENT_CONTROL_PLANE_URL=${HETERONETWORK_ROOTLESS_CONTROL_PLANE_URL:-http://control-plane:8443}
      - HETERONETWORK_AGENT_SIGNAL_URL=${HETERONETWORK_ROOTLESS_SIGNAL_URL:-http://signal:9443}
      - HETERONETWORK_AGENT_RELAY_ADMISSION_URL=${HETERONETWORK_AGENT_RELAY_ADMISSION_URL:-http://relay:9580}
      - HETERONETWORK_AGENT_RELAY_STATUS_URL=${HETERONETWORK_AGENT_RELAY_STATUS_URL:-http://relay:9580}
      - HETERONETWORK_AGENT_RELAY_PUBLIC_ENDPOINT=${HETERONETWORK_AGENT_RELAY_PUBLIC_ENDPOINT:-172.31.254.5:51820}
    ports: !override
      - "${HETERONETWORK_ROOTLESS_AGENT_HTTP_PORT:-9780}:9780"
      - "${HETERONETWORK_ROOTLESS_STUN_UDP_PORT:-3478}:3478/udp"
      - "${HETERONETWORK_ROOTLESS_STUN_ALTERNATE_UDP_PORT:-3480}:3480/udp"
      - "${HETERONETWORK_ROOTLESS_STUN_HTTP_PORT:-3479}:3479"
    depends_on: !override
      control-plane:
        condition: service_healthy
      signal:
        condition: service_healthy
      relay:
        condition: service_healthy
    networks: !override
      default: {}
      workload: {}

  relay:
    networks:
      default:
        ipv4_address: ${HETERONETWORK_ROOTLESS_RELAY_ADDRESS:-172.31.254.5}

  stun:
    network_mode: service:agent
    ports: !reset []
    depends_on:
      agent:
        condition: service_started

networks:
  default:
    ipam:
      config:
        - subnet: ${HETERONETWORK_ROOTLESS_DEFAULT_NETWORK_SUBNET:-172.31.254.0/24}
  workload:
    name: ${HETERONETWORK_ROOTLESS_WORKLOAD_NETWORK:?set HETERONETWORK_ROOTLESS_WORKLOAD_NETWORK}
    external: true
