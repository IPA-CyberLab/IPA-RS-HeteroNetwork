services:
  postgres:
    ports: !reset []
    networks:
      default:
        ipv4_address: 172.30.250.2

  control-plane:
    command: !override
      - control-plane
      - --listen
      - 0.0.0.0:8443
      - --cluster-id
      - ${HETERONETWORK_ROOTLESS_CLUSTER_ID:?set HETERONETWORK_ROOTLESS_CLUSTER_ID}
      - --issuer-node-id
      - ${HETERONETWORK_ROOTLESS_ISSUER_NODE_ID:?set HETERONETWORK_ROOTLESS_ISSUER_NODE_ID}
      - --issuer-key-id
      - ${HETERONETWORK_ROOTLESS_ISSUER_KEY_ID:?set HETERONETWORK_ROOTLESS_ISSUER_KEY_ID}
      - --issuer-public-key
      - ${HETERONETWORK_ROOTLESS_ISSUER_PUBLIC_KEY:?set HETERONETWORK_ROOTLESS_ISSUER_PUBLIC_KEY}
    environment: !override
      HETERONETWORK_DATABASE_URL: postgres://heteronetwork:heteronetwork-dev@172.30.250.2:5432/heteronetwork
      HETERONETWORK_ROLE: control-plane
      HETERONETWORK_CONTROL_PLANE_OPERATOR_API_BEARER_TOKEN_PATH: /run/secrets/heteronetwork-control-plane-operator-api-bearer-token
    networks:
      default:
        ipv4_address: 172.30.250.3
    ports: !reset []

  signal:
    environment: !override
      HETERONETWORK_ROLE: signal
      HETERONETWORK_SIGNAL_CONTROL_PLANE_URLS: http://172.30.250.3:8443
      HETERONETWORK_SIGNAL_OPERATOR_API_BEARER_TOKEN_PATH: /run/secrets/heteronetwork-signal-operator-api-bearer-token
      HETERONETWORK_SIGNAL_PATH_QUALITY_OBSERVATION_TTL_SECONDS: "120"
    networks:
      default:
        ipv4_address: 172.30.250.4
    ports: !reset []

  stun:
    environment: !override
      HETERONETWORK_ROLE: stun
      HETERONETWORK_STUN_ALTERNATE_LISTEN: 0.0.0.0:3480
      HETERONETWORK_STUN_OPERATOR_API_BEARER_TOKEN_PATH: /run/secrets/heteronetwork-stun-operator-api-bearer-token
    networks:
      default:
        ipv4_address: 172.30.250.5
    ports: !reset []

  relay:
    environment: !override
      HETERONETWORK_ROLE: relay
      HETERONETWORK_RELAY_PUBLIC_ENDPOINT: 172.30.250.6:51820
      HETERONETWORK_RELAY_ADMISSION_URL: http://172.30.250.6:9580
      HETERONETWORK_RELAY_MAX_SESSIONS: "10000"
      HETERONETWORK_RELAY_MAX_MBPS: "1000"
      HETERONETWORK_RELAY_SESSION_TTL_SECONDS: "300"
      HETERONETWORK_RELAY_ADMISSION_RATE_LIMIT: "4096"
      HETERONETWORK_RELAY_ADMISSION_RATE_LIMIT_WINDOW_SECONDS: "60"
      HETERONETWORK_RELAY_ADMISSION_BEARER_TOKEN_PATH: /run/secrets/heteronetwork-relay-admission-bearer-token
      HETERONETWORK_RELAY_OPERATOR_API_BEARER_TOKEN_PATH: /run/secrets/heteronetwork-relay-operator-api-bearer-token
    networks:
      default:
        ipv4_address: 172.30.250.6
    ports: !reset []
    cap_add: !reset []
    devices: !reset []

  agent:
    build:
      network: host
    network_mode: !reset null
    networks:
      default:
        ipv4_address: 172.30.250.11
    command: !override
      - agent
      - --listen
      - 0.0.0.0:9780
      - --state-path
      - /var/lib/heteronetwork/agent.json
      - --apply-peer-map
      - --peer-map-poll-interval-seconds
      - "1"
      - --signal-path-interval-seconds
      - "1"
      - --heartbeat-interval-seconds
      - "1"
      - --stun-server
      - 172.30.250.5:3478
    environment: !override
      HETERONETWORK_ROLE: agent
      HETERONETWORK_AGENT_JOIN_TOKEN_PATH: /run/secrets/heteronetwork-agent-join-token
      HETERONETWORK_AGENT_API_BEARER_TOKEN_PATH: /run/secrets/heteronetwork-agent-api-bearer-token
      HETERONETWORK_AGENT_CONTROL_PLANE_URL: http://172.30.250.3:8443
      HETERONETWORK_AGENT_SIGNAL_URL: http://172.30.250.4:9443
      HETERONETWORK_AGENT_STUN_BIND: 0.0.0.0:51821
      HETERONETWORK_AGENT_WIREGUARD_LISTEN_PORT: "51821"
      HETERONETWORK_AGENT_RUNTIME_BACKEND: linux-command
      HETERONETWORK_AGENT_WIREGUARD_BACKEND: userspace-boringtun
      HETERONETWORK_AGENT_ROUTE_BACKEND: command
      HETERONETWORK_AGENT_DISABLE_PEER_PROBE: "true"
      HETERONETWORK_AGENT_DIRECT_PATH_PROBE_TIMEOUT_SECONDS: "30"
      HETERONETWORK_AGENT_DIRECT_HANDSHAKE_MAX_AGE_SECONDS: "180"
      HETERONETWORK_AGENT_APPLY_DOCKER_ROUTES: "false"
      HETERONETWORK_DOCKER_DISCOVER_NETWORKS: "false"
    depends_on: !override
      control-plane:
        condition: service_healthy
      signal:
        condition: service_healthy
      stun:
        condition: service_healthy
    ports: !reset []
    cap_add: !override
      - NET_ADMIN
    devices: !override
      - /dev/net/tun:/dev/net/tun
    secrets: !override
      - heteronetwork-agent-join-token
      - heteronetwork-agent-api-bearer-token
    volumes: !override
      - rootless-agent-a:/var/lib/heteronetwork

  agent-b:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      network: host
    entrypoint:
      - /usr/local/bin/iparsd
    network_mode: !reset null
    networks:
      default:
        ipv4_address: 172.30.250.12
    command:
      - agent
      - --listen
      - 0.0.0.0:9780
      - --state-path
      - /var/lib/heteronetwork/agent-b.json
      - --apply-peer-map
      - --peer-map-poll-interval-seconds
      - "1"
      - --signal-path-interval-seconds
      - "1"
      - --heartbeat-interval-seconds
      - "1"
      - --stun-server
      - 172.30.250.5:3478
    environment: !override
      HETERONETWORK_ROLE: agent
      HETERONETWORK_AGENT_JOIN_TOKEN_PATH: /run/secrets/heteronetwork-agent-join-token
      HETERONETWORK_AGENT_API_BEARER_TOKEN_PATH: /run/secrets/heteronetwork-agent-api-bearer-token
      HETERONETWORK_AGENT_CONTROL_PLANE_URL: http://172.30.250.3:8443
      HETERONETWORK_AGENT_SIGNAL_URL: http://172.30.250.4:9443
      HETERONETWORK_AGENT_STUN_BIND: 0.0.0.0:51821
      HETERONETWORK_AGENT_WIREGUARD_LISTEN_PORT: "51821"
      HETERONETWORK_AGENT_RUNTIME_BACKEND: linux-command
      HETERONETWORK_AGENT_WIREGUARD_BACKEND: userspace-boringtun
      HETERONETWORK_AGENT_ROUTE_BACKEND: command
      HETERONETWORK_AGENT_DISABLE_PEER_PROBE: "true"
      HETERONETWORK_AGENT_DIRECT_PATH_PROBE_TIMEOUT_SECONDS: "30"
      HETERONETWORK_AGENT_DIRECT_HANDSHAKE_MAX_AGE_SECONDS: "180"
      HETERONETWORK_AGENT_APPLY_DOCKER_ROUTES: "false"
      HETERONETWORK_DOCKER_DISCOVER_NETWORKS: "false"
    depends_on:
      control-plane:
        condition: service_healthy
      signal:
        condition: service_healthy
      stun:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9780/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s
    ports: !reset []
    cap_add: !override
      - NET_ADMIN
    devices: !override
      - /dev/net/tun:/dev/net/tun
    secrets: !override
      - heteronetwork-agent-join-token
      - heteronetwork-agent-api-bearer-token
    volumes: !override
      - rootless-agent-b:/var/lib/heteronetwork

secrets:
  heteronetwork-control-plane-operator-api-bearer-token:
    file: ${HETERONETWORK_ROOTLESS_CONTROL_PLANE_OPERATOR_TOKEN_FILE:?set HETERONETWORK_ROOTLESS_CONTROL_PLANE_OPERATOR_TOKEN_FILE}
  heteronetwork-signal-operator-api-bearer-token:
    file: ${HETERONETWORK_ROOTLESS_SIGNAL_OPERATOR_TOKEN_FILE:?set HETERONETWORK_ROOTLESS_SIGNAL_OPERATOR_TOKEN_FILE}
  heteronetwork-stun-operator-api-bearer-token:
    file: ${HETERONETWORK_ROOTLESS_STUN_OPERATOR_TOKEN_FILE:?set HETERONETWORK_ROOTLESS_STUN_OPERATOR_TOKEN_FILE}
  heteronetwork-relay-operator-api-bearer-token:
    file: ${HETERONETWORK_ROOTLESS_RELAY_OPERATOR_TOKEN_FILE:?set HETERONETWORK_ROOTLESS_RELAY_OPERATOR_TOKEN_FILE}
  heteronetwork-relay-admission-bearer-token:
    file: ${HETERONETWORK_ROOTLESS_RELAY_ADMISSION_TOKEN_FILE:?set HETERONETWORK_ROOTLESS_RELAY_ADMISSION_TOKEN_FILE}
  heteronetwork-agent-join-token:
    file: ${HETERONETWORK_ROOTLESS_JOIN_TOKEN_FILE:?set HETERONETWORK_ROOTLESS_JOIN_TOKEN_FILE}
  heteronetwork-agent-api-bearer-token:
    file: ${HETERONETWORK_ROOTLESS_AGENT_API_TOKEN_FILE:?set HETERONETWORK_ROOTLESS_AGENT_API_TOKEN_FILE}

networks:
  default:
    ipam:
      config:
        - subnet: 172.30.250.0/24

volumes:
  rootless-agent-a:
  rootless-agent-b:
