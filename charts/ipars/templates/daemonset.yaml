{{- if or (eq .Values.agent.joinTokenSecretName "") (gt (len .Values.agent.joinTokenSecretName) 253) (not (regexMatch "^[a-z0-9]([-a-z0-9]*[a-z0-9])?([.][a-z0-9]([-a-z0-9]*[a-z0-9])?)*$" .Values.agent.joinTokenSecretName)) -}}
{{- fail "agent.joinTokenSecretName must be a Kubernetes DNS subdomain" -}}
{{- end -}}
{{- if or (eq .Values.agent.joinTokenSecretKey "") (gt (len .Values.agent.joinTokenSecretKey) 253) (not (regexMatch "^[A-Za-z0-9._-]+$" .Values.agent.joinTokenSecretKey)) -}}
{{- fail "agent.joinTokenSecretKey must contain only ASCII letters, digits, '.', '_' or '-'" -}}
{{- end -}}
{{- $clusterUrlPattern := "^https?://[^/[:space:]][^[:space:]]*$" -}}
{{- $hostPortPattern := "^([^[:space:]:]+|\\[[0-9A-Fa-f:.]+\\]):[0-9]+$" -}}
{{- $rbacCreate := printf "%v" .Values.rbac.create -}}
{{- $serviceAccountCreate := printf "%v" .Values.serviceAccount.create -}}
{{- $agentAutomountServiceAccountToken := printf "%v" .Values.agent.automountServiceAccountToken -}}
{{- $agentTerminationGracePeriodSeconds := printf "%v" .Values.agent.terminationGracePeriodSeconds -}}
{{- $agentPrivileged := printf "%v" .Values.agent.privileged -}}
{{- $agentAllowPrivilegeEscalation := printf "%v" .Values.agent.securityContext.allowPrivilegeEscalation -}}
{{- $agentDnsPolicy := .Values.agent.dnsPolicy -}}
{{- $agentStateHostPath := .Values.agent.state.hostPath -}}
{{- $agentStateHostPathType := .Values.agent.state.hostPathType -}}
{{- $agentStateMountPath := .Values.agent.state.mountPath -}}
{{- $agentLivenessProbeEnabled := printf "%v" .Values.agent.probes.liveness.enabled -}}
{{- $agentReadinessProbeEnabled := printf "%v" .Values.agent.probes.readiness.enabled -}}
{{- $absolutePathPattern := "^/[A-Za-z0-9._/@%+=:,/-]+$" -}}
{{- $httpPathPattern := "^/[A-Za-z0-9._~!$&'()*+,;=:@%/-]*$" -}}
{{- if or (eq .Values.agent.interfaceName "") (gt (len .Values.agent.interfaceName) 15) (not (regexMatch "^[A-Za-z0-9._-]+$" .Values.agent.interfaceName)) -}}
{{- fail "agent.interfaceName must be a Linux interface name of 1-15 ASCII letters, digits, '.', '_' or '-'" -}}
{{- end -}}
{{- $imagePullSecrets := dict -}}
{{- range .Values.imagePullSecrets -}}
{{- $secretName := printf "%v" . -}}
{{- if or (eq $secretName "") (gt (len $secretName) 253) (not (regexMatch "^[a-z0-9]([-a-z0-9]*[a-z0-9])?([.][a-z0-9]([-a-z0-9]*[a-z0-9])?)*$" $secretName)) -}}
{{- fail (printf "imagePullSecrets entry %q must be a Kubernetes Secret name" $secretName) -}}
{{- end -}}
{{- if hasKey $imagePullSecrets $secretName -}}
{{- fail (printf "imagePullSecrets entry %q must not be repeated" $secretName) -}}
{{- end -}}
{{- $_ := set $imagePullSecrets $secretName true -}}
{{- end -}}
{{- if not (or (eq $rbacCreate "true") (eq $rbacCreate "false")) -}}
{{- fail "rbac.create must be true or false" -}}
{{- end -}}
{{- if not (or (eq $serviceAccountCreate "true") (eq $serviceAccountCreate "false")) -}}
{{- fail "serviceAccount.create must be true or false" -}}
{{- end -}}
{{- if and .Values.serviceAccount.name (or (gt (len .Values.serviceAccount.name) 253) (not (regexMatch "^[a-z0-9]([-a-z0-9]*[a-z0-9])?([.][a-z0-9]([-a-z0-9]*[a-z0-9])?)*$" .Values.serviceAccount.name))) -}}
{{- fail "serviceAccount.name must be a Kubernetes DNS subdomain" -}}
{{- end -}}
{{- if and (eq $serviceAccountCreate "false") .Values.serviceAccount.annotations -}}
{{- fail "serviceAccount.annotations require serviceAccount.create=true" -}}
{{- end -}}
{{- range $key, $_ := .Values.serviceAccount.annotations -}}
{{- include "ipars.validateAnnotationKey" (dict "path" "serviceAccount.annotations" "key" $key) -}}
{{- end -}}
{{- if not (or (eq $agentAutomountServiceAccountToken "true") (eq $agentAutomountServiceAccountToken "false")) -}}
{{- fail "agent.automountServiceAccountToken must be true or false" -}}
{{- end -}}
{{- if not (or (eq $agentPrivileged "true") (eq $agentPrivileged "false")) -}}
{{- fail "agent.privileged must be true or false" -}}
{{- end -}}
{{- if not (or (eq $agentAllowPrivilegeEscalation "") (eq $agentAllowPrivilegeEscalation "true") (eq $agentAllowPrivilegeEscalation "false")) -}}
{{- fail "agent.securityContext.allowPrivilegeEscalation must be true, false, or empty" -}}
{{- end -}}
{{- if and (eq $agentPrivileged "true") (eq $agentAllowPrivilegeEscalation "false") -}}
{{- fail "agent.securityContext.allowPrivilegeEscalation=false cannot be used with agent.privileged=true" -}}
{{- end -}}
{{- if not (or (eq $agentDnsPolicy "ClusterFirstWithHostNet") (eq $agentDnsPolicy "ClusterFirst") (eq $agentDnsPolicy "Default") (eq $agentDnsPolicy "None")) -}}
{{- fail "agent.dnsPolicy must be ClusterFirstWithHostNet, ClusterFirst, Default, or None" -}}
{{- end -}}
{{- if or (eq $agentStateHostPath "") (gt (len $agentStateHostPath) 4096) (not (regexMatch $absolutePathPattern $agentStateHostPath)) (regexMatch "(^|/)[.][.]($|/)" $agentStateHostPath) (regexMatch "/$" $agentStateHostPath) -}}
{{- fail "agent.state.hostPath must be an absolute host path without '..' segments or trailing '/'" -}}
{{- end -}}
{{- if not (or (eq $agentStateHostPathType "DirectoryOrCreate") (eq $agentStateHostPathType "Directory")) -}}
{{- fail "agent.state.hostPathType must be DirectoryOrCreate or Directory" -}}
{{- end -}}
{{- if or (eq $agentStateMountPath "") (eq $agentStateMountPath "/") (gt (len $agentStateMountPath) 4096) (not (regexMatch $absolutePathPattern $agentStateMountPath)) (regexMatch "(^|/)[.][.]($|/)" $agentStateMountPath) (regexMatch "/$" $agentStateMountPath) -}}
{{- fail "agent.state.mountPath must be an absolute container path other than '/' without '..' segments or trailing '/'" -}}
{{- end -}}
{{- if not (or (eq $agentLivenessProbeEnabled "true") (eq $agentLivenessProbeEnabled "false")) -}}
{{- fail "agent.probes.liveness.enabled must be true or false" -}}
{{- end -}}
{{- if not (or (eq $agentReadinessProbeEnabled "true") (eq $agentReadinessProbeEnabled "false")) -}}
{{- fail "agent.probes.readiness.enabled must be true or false" -}}
{{- end -}}
{{- range $probeName, $probe := .Values.agent.probes -}}
{{- $probePath := $probe.path -}}
{{- if or (eq $probePath "") (gt (len $probePath) 256) (not (regexMatch $httpPathPattern $probePath)) -}}
{{- fail (printf "agent.probes.%s.path must be an absolute HTTP path of at most 256 bytes" $probeName) -}}
{{- end -}}
{{- $initialDelaySeconds := printf "%v" $probe.initialDelaySeconds -}}
{{- $periodSeconds := printf "%v" $probe.periodSeconds -}}
{{- $timeoutSeconds := printf "%v" $probe.timeoutSeconds -}}
{{- $failureThreshold := printf "%v" $probe.failureThreshold -}}
{{- include "ipars.validateNonNegativeInteger" (dict "path" (printf "agent.probes.%s.initialDelaySeconds" $probeName) "value" $initialDelaySeconds) -}}
{{- include "ipars.validateNonNegativeInteger" (dict "path" (printf "agent.probes.%s.periodSeconds" $probeName) "value" $periodSeconds) -}}
{{- include "ipars.validateNonNegativeInteger" (dict "path" (printf "agent.probes.%s.timeoutSeconds" $probeName) "value" $timeoutSeconds) -}}
{{- include "ipars.validateNonNegativeInteger" (dict "path" (printf "agent.probes.%s.failureThreshold" $probeName) "value" $failureThreshold) -}}
{{- if lt (int $periodSeconds) 1 -}}
{{- fail (printf "agent.probes.%s.periodSeconds must be greater than zero" $probeName) -}}
{{- end -}}
{{- if lt (int $timeoutSeconds) 1 -}}
{{- fail (printf "agent.probes.%s.timeoutSeconds must be greater than zero" $probeName) -}}
{{- end -}}
{{- if lt (int $failureThreshold) 1 -}}
{{- fail (printf "agent.probes.%s.failureThreshold must be greater than zero" $probeName) -}}
{{- end -}}
{{- end -}}
{{- include "ipars.validateNonNegativeInt64" (dict "path" "agent.terminationGracePeriodSeconds" "value" $agentTerminationGracePeriodSeconds) -}}
{{- if .Values.agent.priorityClassName -}}
{{- if or (gt (len .Values.agent.priorityClassName) 253) (not (regexMatch "^[a-z0-9]([-a-z0-9]*[a-z0-9])?([.][a-z0-9]([-a-z0-9]*[a-z0-9])?)*$" .Values.agent.priorityClassName)) -}}
{{- fail "agent.priorityClassName must be a Kubernetes DNS subdomain" -}}
{{- end -}}
{{- end -}}
{{- range $key, $value := .Values.agent.podLabels -}}
{{- include "ipars.validateLabelKey" (dict "path" "agent.podLabels" "key" $key) -}}
{{- include "ipars.validateLabelValue" (dict "path" "agent.podLabels" "value" (printf "%v" $value)) -}}
{{- end -}}
{{- range $key, $_ := .Values.agent.podAnnotations -}}
{{- include "ipars.validateAnnotationKey" (dict "path" "agent.podAnnotations" "key" $key) -}}
{{- end -}}
{{- range $key, $value := .Values.agent.nodeSelector -}}
{{- include "ipars.validateLabelKey" (dict "path" "agent.nodeSelector" "key" $key) -}}
{{- include "ipars.validateLabelValue" (dict "path" "agent.nodeSelector" "value" (printf "%v" $value)) -}}
{{- end -}}
{{- range $index, $toleration := .Values.agent.tolerations -}}
{{- $path := printf "agent.tolerations[%d]" $index -}}
{{- $tolerationKey := default "" $toleration.key -}}
{{- $tolerationOperator := default "Equal" $toleration.operator -}}
{{- $tolerationValue := default "" $toleration.value -}}
{{- $tolerationEffect := default "" $toleration.effect -}}
{{- if ne $tolerationKey "" -}}
{{- include "ipars.validateLabelKey" (dict "path" $path "key" $tolerationKey) -}}
{{- end -}}
{{- if and (ne $tolerationOperator "Exists") (ne $tolerationOperator "Equal") -}}
{{- fail (printf "%s.operator must be Exists or Equal" $path) -}}
{{- end -}}
{{- if and (eq $tolerationKey "") (ne $tolerationOperator "Exists") -}}
{{- fail (printf "%s with an empty key requires operator Exists" $path) -}}
{{- end -}}
{{- if and (eq $tolerationOperator "Exists") (ne $tolerationValue "") -}}
{{- fail (printf "%s.value must be empty when operator is Exists" $path) -}}
{{- end -}}
{{- if ne $tolerationValue "" -}}
{{- include "ipars.validateLabelValue" (dict "path" $path "value" (printf "%v" $tolerationValue)) -}}
{{- end -}}
{{- if and (ne $tolerationEffect "") (not (or (eq $tolerationEffect "NoSchedule") (eq $tolerationEffect "PreferNoSchedule") (eq $tolerationEffect "NoExecute"))) -}}
{{- fail (printf "%s.effect must be NoSchedule, PreferNoSchedule, or NoExecute" $path) -}}
{{- end -}}
{{- if hasKey $toleration "tolerationSeconds" -}}
{{- $tolerationSeconds := printf "%v" $toleration.tolerationSeconds -}}
{{- include "ipars.validateNonNegativeInteger" (dict "path" (printf "%s.tolerationSeconds" $path) "value" $tolerationSeconds) -}}
{{- if ne $tolerationEffect "NoExecute" -}}
{{- fail (printf "%s.tolerationSeconds requires effect NoExecute" $path) -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- include "ipars.validateResourceQuantity" (dict "path" "agent.resources.requests.cpu" "value" (printf "%v" .Values.agent.resources.requests.cpu)) -}}
{{- include "ipars.validateResourceQuantity" (dict "path" "agent.resources.requests.memory" "value" (printf "%v" .Values.agent.resources.requests.memory)) -}}
{{- include "ipars.validateResourceQuantity" (dict "path" "agent.resources.limits.cpu" "value" (printf "%v" .Values.agent.resources.limits.cpu)) -}}
{{- include "ipars.validateResourceQuantity" (dict "path" "agent.resources.limits.memory" "value" (printf "%v" .Values.agent.resources.limits.memory)) -}}
{{- $agentCapabilityAdds := dict -}}
{{- range .Values.agent.securityContext.capabilities.add -}}
{{- $capability := printf "%v" . -}}
{{- if or (eq $capability "") (gt (len $capability) 64) (not (regexMatch "^(ALL|[A-Z][A-Z0-9_]{0,63})$" $capability)) -}}
{{- fail (printf "agent.securityContext.capabilities.add entry %q must be a Linux capability name" $capability) -}}
{{- end -}}
{{- if hasKey $agentCapabilityAdds $capability -}}
{{- fail (printf "agent.securityContext.capabilities.add entry %q must not be repeated" $capability) -}}
{{- end -}}
{{- $_ := set $agentCapabilityAdds $capability true -}}
{{- end -}}
{{- $agentCapabilityDrops := dict -}}
{{- range .Values.agent.securityContext.capabilities.drop -}}
{{- $capability := printf "%v" . -}}
{{- if or (eq $capability "") (gt (len $capability) 64) (not (regexMatch "^(ALL|[A-Z][A-Z0-9_]{0,63})$" $capability)) -}}
{{- fail (printf "agent.securityContext.capabilities.drop entry %q must be a Linux capability name" $capability) -}}
{{- end -}}
{{- if hasKey $agentCapabilityDrops $capability -}}
{{- fail (printf "agent.securityContext.capabilities.drop entry %q must not be repeated" $capability) -}}
{{- end -}}
{{- if hasKey $agentCapabilityAdds $capability -}}
{{- fail (printf "agent securityContext capability %q cannot be both added and dropped" $capability) -}}
{{- end -}}
{{- $_ := set $agentCapabilityDrops $capability true -}}
{{- end -}}
{{- if and (eq $agentAllowPrivilegeEscalation "false") (or (hasKey $agentCapabilityAdds "SYS_ADMIN") (hasKey $agentCapabilityAdds "CAP_SYS_ADMIN")) -}}
{{- fail "agent.securityContext.allowPrivilegeEscalation=false cannot be used when SYS_ADMIN is added" -}}
{{- end -}}
{{- $agentRolloutUpdateStrategy := .Values.agent.rollout.updateStrategy -}}
{{- $agentRolloutMaxUnavailable := printf "%v" .Values.agent.rollout.maxUnavailable -}}
{{- $agentRolloutMaxSurge := printf "%v" .Values.agent.rollout.maxSurge -}}
{{- $agentMinReadySeconds := printf "%v" .Values.agent.rollout.minReadySeconds -}}
{{- $agentRevisionHistoryLimit := printf "%v" .Values.agent.rollout.revisionHistoryLimit -}}
{{- $agentRollingUpdateConfigured := or (ne $agentRolloutMaxUnavailable "") (ne $agentRolloutMaxSurge "") -}}
{{- if and (ne $agentRolloutUpdateStrategy "") (not (or (eq $agentRolloutUpdateStrategy "RollingUpdate") (eq $agentRolloutUpdateStrategy "OnDelete"))) -}}
{{- fail "agent.rollout.updateStrategy must be RollingUpdate or OnDelete" -}}
{{- end -}}
{{- if and (eq $agentRolloutUpdateStrategy "OnDelete") $agentRollingUpdateConfigured -}}
{{- fail "agent.rollout.maxUnavailable and agent.rollout.maxSurge require agent.rollout.updateStrategy RollingUpdate or empty" -}}
{{- end -}}
{{- include "ipars.validateIntOrPercent" (dict "path" "agent.rollout.maxUnavailable" "value" $agentRolloutMaxUnavailable) -}}
{{- include "ipars.validateIntOrPercent" (dict "path" "agent.rollout.maxSurge" "value" $agentRolloutMaxSurge) -}}
{{- include "ipars.validateNonNegativeInteger" (dict "path" "agent.rollout.minReadySeconds" "value" $agentMinReadySeconds) -}}
{{- include "ipars.validateNonNegativeInteger" (dict "path" "agent.rollout.revisionHistoryLimit" "value" $agentRevisionHistoryLimit) -}}
{{- if and (or (eq $agentRolloutMaxUnavailable "0") (eq $agentRolloutMaxUnavailable "0%")) (or (eq $agentRolloutMaxSurge "") (eq $agentRolloutMaxSurge "0") (eq $agentRolloutMaxSurge "0%")) -}}
{{- fail "agent.rollout.maxUnavailable cannot be zero when agent.rollout.maxSurge is zero or unset" -}}
{{- end -}}
{{- if not (regexMatch $clusterUrlPattern .Values.cluster.controlPlaneUrl) -}}
{{- fail "cluster.controlPlaneUrl must be an absolute HTTP(S) URL with a host" -}}
{{- end -}}
{{- if not (regexMatch $clusterUrlPattern .Values.cluster.signalUrl) -}}
{{- fail "cluster.signalUrl must be an absolute HTTP(S) URL with a host" -}}
{{- end -}}
{{- if and .Values.cluster.stunEndpoint (not (regexMatch $hostPortPattern .Values.cluster.stunEndpoint)) -}}
{{- fail "cluster.stunEndpoint must be host:port or [ipv6]:port" -}}
{{- end -}}
{{- if and .Values.cluster.stunEndpoint (or (lt (int (regexFind "[0-9]+$" .Values.cluster.stunEndpoint)) 1) (gt (int (regexFind "[0-9]+$" .Values.cluster.stunEndpoint)) 65535)) -}}
{{- fail "cluster.stunEndpoint port must be between 1 and 65535" -}}
{{- end -}}
{{- if and .Values.cluster.relayEndpoint (not (regexMatch $hostPortPattern .Values.cluster.relayEndpoint)) -}}
{{- fail "cluster.relayEndpoint must be host:port or [ipv6]:port" -}}
{{- end -}}
{{- if and .Values.cluster.relayEndpoint (or (lt (int (regexFind "[0-9]+$" .Values.cluster.relayEndpoint)) 1) (gt (int (regexFind "[0-9]+$" .Values.cluster.relayEndpoint)) 65535)) -}}
{{- fail "cluster.relayEndpoint port must be between 1 and 65535" -}}
{{- end -}}
{{- if .Values.agent.relayAdvertisement.enabled -}}
{{- if not .Values.agent.relayAdvertisement.publicEndpoint -}}
{{- fail "agent.relayAdvertisement.publicEndpoint is required when agent.relayAdvertisement.enabled=true" -}}
{{- end -}}
{{- if not (regexMatch $hostPortPattern .Values.agent.relayAdvertisement.publicEndpoint) -}}
{{- fail "agent.relayAdvertisement.publicEndpoint must be host:port or [ipv6]:port" -}}
{{- end -}}
{{- if or (lt (int (regexFind "[0-9]+$" .Values.agent.relayAdvertisement.publicEndpoint)) 1) (gt (int (regexFind "[0-9]+$" .Values.agent.relayAdvertisement.publicEndpoint)) 65535) -}}
{{- fail "agent.relayAdvertisement.publicEndpoint port must be between 1 and 65535" -}}
{{- end -}}
{{- if not .Values.agent.relayAdvertisement.admissionUrl -}}
{{- fail "agent.relayAdvertisement.admissionUrl is required when agent.relayAdvertisement.enabled=true" -}}
{{- end -}}
{{- if not (regexMatch "^https?://[^/[:space:]][^[:space:]]*$" .Values.agent.relayAdvertisement.admissionUrl) -}}
{{- fail "agent.relayAdvertisement.admissionUrl must be an absolute HTTP(S) URL with a host" -}}
{{- end -}}
{{- if and .Values.agent.relayAdvertisement.statusUrl (not (regexMatch "^https?://[^/[:space:]][^[:space:]]*$" .Values.agent.relayAdvertisement.statusUrl)) -}}
{{- fail "agent.relayAdvertisement.statusUrl must be an absolute HTTP(S) URL with a host" -}}
{{- end -}}
{{- if not (gt (int .Values.agent.relayAdvertisement.maxSessions) 0) -}}
{{- fail "agent.relayAdvertisement.maxSessions must be greater than zero" -}}
{{- end -}}
{{- if not (gt (int .Values.agent.relayAdvertisement.maxMbps) 0) -}}
{{- fail "agent.relayAdvertisement.maxMbps must be greater than zero" -}}
{{- end -}}
{{- end -}}
{{- if .Values.serviceExposure.enabled -}}
{{- if not (gt (int .Values.serviceExposure.routeIntervalSeconds) 0) -}}
{{- fail "serviceExposure.routeIntervalSeconds must be greater than zero" -}}
{{- end -}}
{{- if and (not .Values.serviceExposure.discoverServices) .Values.serviceExposure.namespaces -}}
{{- fail "serviceExposure.namespaces requires serviceExposure.discoverServices=true" -}}
{{- end -}}
{{- if and (not .Values.serviceExposure.discoverServices) .Values.serviceExposure.serviceLabelSelector -}}
{{- fail "serviceExposure.serviceLabelSelector requires serviceExposure.discoverServices=true" -}}
{{- end -}}
{{- if and (eq $agentAutomountServiceAccountToken "false") .Values.serviceExposure.discoverServices -}}
{{- fail "agent.automountServiceAccountToken=false cannot be used with serviceExposure.discoverServices=true" -}}
{{- end -}}
{{- $serviceExposureNamespaces := dict -}}
{{- range .Values.serviceExposure.namespaces -}}
{{- if or (eq . "") (gt (len .) 63) (not (regexMatch "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$" .)) -}}
{{- fail (printf "serviceExposure.namespaces entry %q must be a DNS label using lowercase ASCII letters, digits, and '-' with alphanumeric edges" .) -}}
{{- end -}}
{{- if hasKey $serviceExposureNamespaces . -}}
{{- fail (printf "serviceExposure.namespaces entry %q must not be repeated" .) -}}
{{- end -}}
{{- $_ := set $serviceExposureNamespaces . true -}}
{{- end -}}
{{- if and .Values.serviceExposure.serviceLabelSelector (gt (len .Values.serviceExposure.serviceLabelSelector) 1024) -}}
{{- fail "serviceExposure.serviceLabelSelector must not exceed 1024 bytes" -}}
{{- end -}}
{{- if and .Values.serviceExposure.serviceLabelSelector (regexMatch "[[:cntrl:]]" .Values.serviceExposure.serviceLabelSelector) -}}
{{- fail "serviceExposure.serviceLabelSelector must not contain control characters" -}}
{{- end -}}
{{- end -}}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "ipars.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "ipars.name" . }}
spec:
  {{- if ne $agentMinReadySeconds "" }}
  minReadySeconds: {{ int $agentMinReadySeconds }}
  {{- end }}
  {{- if ne $agentRevisionHistoryLimit "" }}
  revisionHistoryLimit: {{ int $agentRevisionHistoryLimit }}
  {{- end }}
  {{- if or (ne $agentRolloutUpdateStrategy "") $agentRollingUpdateConfigured }}
  updateStrategy:
    type: {{ default "RollingUpdate" $agentRolloutUpdateStrategy }}
    {{- if $agentRollingUpdateConfigured }}
    rollingUpdate:
      {{- if ne $agentRolloutMaxUnavailable "" }}
      maxUnavailable: {{- if regexMatch "%$" $agentRolloutMaxUnavailable }} {{ $agentRolloutMaxUnavailable | quote }}{{- else }} {{ int $agentRolloutMaxUnavailable }}{{- end }}
      {{- end }}
      {{- if ne $agentRolloutMaxSurge "" }}
      maxSurge: {{- if regexMatch "%$" $agentRolloutMaxSurge }} {{ $agentRolloutMaxSurge | quote }}{{- else }} {{ int $agentRolloutMaxSurge }}{{- end }}
      {{- end }}
    {{- end }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ipars.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ipars.name" . }}
        {{- range $key, $value := .Values.agent.podLabels }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
      {{- with .Values.agent.podAnnotations }}
      annotations:
        {{- range $key, $value := . }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "ipars.serviceAccountName" . }}
      automountServiceAccountToken: {{ $agentAutomountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . | quote }}
        {{- end }}
      {{- end }}
      hostNetwork: {{ .Values.agent.hostNetwork }}
      dnsPolicy: {{ $agentDnsPolicy | quote }}
      {{- if ne $agentTerminationGracePeriodSeconds "" }}
      terminationGracePeriodSeconds: {{ int $agentTerminationGracePeriodSeconds }}
      {{- end }}
      {{- if .Values.agent.priorityClassName }}
      priorityClassName: {{ .Values.agent.priorityClassName | quote }}
      {{- end }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- range $key, $value := . }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- range . }}
        -
          {{- if .key }}
          key: {{ .key | quote }}
          {{- end }}
          {{- if .operator }}
          operator: {{ .operator | quote }}
          {{- end }}
          {{- if .value }}
          value: {{ .value | quote }}
          {{- end }}
          {{- if .effect }}
          effect: {{ .effect | quote }}
          {{- end }}
          {{- if hasKey . "tolerationSeconds" }}
          tolerationSeconds: {{ int .tolerationSeconds }}
          {{- end }}
        {{- end }}
      {{- end }}
      initContainers:
        - name: prepare-agent-state
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p "$IPARS_AGENT_STATE_DIR"
              chmod 0700 "$IPARS_AGENT_STATE_DIR"
          env:
            - name: IPARS_AGENT_STATE_DIR
              value: {{ $agentStateMountPath | quote }}
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
          volumeMounts:
            - name: agent-state
              mountPath: {{ $agentStateMountPath | quote }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/local/bin/iparsd
          args:
            - agent
            - --listen
            - 0.0.0.0:9780
            - --state-path
            - {{ printf "%s/agent.json" $agentStateMountPath | quote }}
            - --wireguard-interface
            - {{ .Values.agent.interfaceName | quote }}
            - --join-token-path
            - {{ printf "%s/token/%s" $agentStateMountPath .Values.agent.joinTokenSecretKey | quote }}
            {{- if .Values.agent.relayAdvertisement.enabled }}
            - --relay-public-endpoint
            - {{ .Values.agent.relayAdvertisement.publicEndpoint | quote }}
            - --relay-admission-url
            - {{ .Values.agent.relayAdvertisement.admissionUrl | quote }}
            {{- if .Values.agent.relayAdvertisement.statusUrl }}
            - --relay-status-url
            - {{ .Values.agent.relayAdvertisement.statusUrl | quote }}
            {{- end }}
            - --relay-max-sessions
            - {{ .Values.agent.relayAdvertisement.maxSessions | quote }}
            - --relay-max-mbps
            - {{ .Values.agent.relayAdvertisement.maxMbps | quote }}
            {{- end }}
            - --control-plane-url
            - {{ .Values.cluster.controlPlaneUrl | quote }}
            - --signal-url
            - {{ .Values.cluster.signalUrl | quote }}
            {{- if .Values.cluster.stunEndpoint }}
            - --stun-server
            - {{ .Values.cluster.stunEndpoint | quote }}
            {{- end }}
            {{- if .Values.serviceExposure.enabled }}
            - --apply-kubernetes-underlay
            - --kubernetes-route-interval-seconds
            - {{ .Values.serviceExposure.routeIntervalSeconds | quote }}
            {{- if .Values.serviceExposure.discoverServices }}
            - --kubernetes-discover-services
            {{- range .Values.serviceExposure.namespaces }}
            - --kubernetes-namespace
            - {{ . | quote }}
            {{- end }}
            {{- if .Values.serviceExposure.serviceLabelSelector }}
            - --kubernetes-service-label-selector
            - {{ .Values.serviceExposure.serviceLabelSelector | quote }}
            {{- end }}
            {{- end }}
            {{- range .Values.serviceExposure.apiServerCidrs }}
            - --kubernetes-api-server-cidr
            - {{ . | quote }}
            {{- end }}
            {{- range .Values.serviceExposure.serviceCidrs }}
            - --kubernetes-service-cidr
            - {{ . | quote }}
            {{- end }}
            {{- if .Values.serviceExposure.routeProviderNodeId }}
            - --kubernetes-route-provider
            - {{ .Values.serviceExposure.routeProviderNodeId | quote }}
            {{- end }}
            {{- end }}
          env:
            - name: IPARS_KUBERNETES_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if .Values.serviceExposure.enabled }}
            - name: IPARS_KUBERNETES_DISCOVER_API_SERVER
              value: {{ .Values.serviceExposure.discoverApiServer | quote }}
            {{- end }}
            - name: IPARS_CONTROL_PLANE_URL
              value: {{ .Values.cluster.controlPlaneUrl | quote }}
            - name: IPARS_SIGNAL_URL
              value: {{ .Values.cluster.signalUrl | quote }}
            - name: IPARS_STUN_ENDPOINT
              value: {{ .Values.cluster.stunEndpoint | quote }}
            - name: IPARS_RELAY_ENDPOINT
              value: {{ .Values.cluster.relayEndpoint | quote }}
            - name: IPARS_AGENT_WIREGUARD_INTERFACE
              value: {{ .Values.agent.interfaceName | quote }}
            - name: IPARS_ROUTE_PROVIDER
              value: {{ .Values.agent.routeProvider | quote }}
          securityContext:
            privileged: {{ $agentPrivileged }}
            {{- if ne $agentAllowPrivilegeEscalation "" }}
            allowPrivilegeEscalation: {{ $agentAllowPrivilegeEscalation }}
            {{- end }}
            {{- if or .Values.agent.securityContext.capabilities.add .Values.agent.securityContext.capabilities.drop }}
            capabilities:
              {{- with .Values.agent.securityContext.capabilities.add }}
              add:
                {{- range . }}
                - {{ . | quote }}
                {{- end }}
              {{- end }}
              {{- with .Values.agent.securityContext.capabilities.drop }}
              drop:
                {{- range . }}
                - {{ . | quote }}
                {{- end }}
              {{- end }}
            {{- end }}
          {{- if or .Values.agent.resources.requests.cpu .Values.agent.resources.requests.memory .Values.agent.resources.limits.cpu .Values.agent.resources.limits.memory }}
          resources:
            {{- if or .Values.agent.resources.requests.cpu .Values.agent.resources.requests.memory }}
            requests:
              {{- if .Values.agent.resources.requests.cpu }}
              cpu: {{ .Values.agent.resources.requests.cpu | quote }}
              {{- end }}
              {{- if .Values.agent.resources.requests.memory }}
              memory: {{ .Values.agent.resources.requests.memory | quote }}
              {{- end }}
            {{- end }}
            {{- if or .Values.agent.resources.limits.cpu .Values.agent.resources.limits.memory }}
            limits:
              {{- if .Values.agent.resources.limits.cpu }}
              cpu: {{ .Values.agent.resources.limits.cpu | quote }}
              {{- end }}
              {{- if .Values.agent.resources.limits.memory }}
              memory: {{ .Values.agent.resources.limits.memory | quote }}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- if eq $agentLivenessProbeEnabled "true" }}
          livenessProbe:
            httpGet:
              path: {{ .Values.agent.probes.liveness.path | quote }}
              port: 9780
            initialDelaySeconds: {{ int .Values.agent.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ int .Values.agent.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ int .Values.agent.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ int .Values.agent.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if eq $agentReadinessProbeEnabled "true" }}
          readinessProbe:
            httpGet:
              path: {{ .Values.agent.probes.readiness.path | quote }}
              port: 9780
            initialDelaySeconds: {{ int .Values.agent.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ int .Values.agent.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ int .Values.agent.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ int .Values.agent.probes.readiness.failureThreshold }}
          {{- end }}
          volumeMounts:
            - name: agent-state
              mountPath: {{ $agentStateMountPath | quote }}
            - name: dev-net-tun
              mountPath: /dev/net/tun
            - name: join-token
              mountPath: {{ printf "%s/token" $agentStateMountPath | quote }}
              readOnly: true
      volumes:
        - name: agent-state
          hostPath:
            path: {{ $agentStateHostPath | quote }}
            type: {{ $agentStateHostPathType | quote }}
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: join-token
          secret:
            secretName: {{ .Values.agent.joinTokenSecretName }}
            items:
              - key: {{ .Values.agent.joinTokenSecretKey | quote }}
                path: {{ .Values.agent.joinTokenSecretKey | quote }}
