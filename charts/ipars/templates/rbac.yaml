{{- include "ipars.validateBoolean" (dict "path" "rbac.create" "value" .Values.rbac.create) -}}
{{- include "ipars.validateBoolean" (dict "path" "serviceExposure.enabled" "value" .Values.serviceExposure.enabled) -}}
{{- include "ipars.validateBoolean" (dict "path" "serviceExposure.discoverServices" "value" .Values.serviceExposure.discoverServices) -}}
{{- $root := . -}}
{{- $rbacCreate := .Values.rbac.create -}}
{{- if and $rbacCreate .Values.serviceExposure.enabled .Values.serviceExposure.discoverServices -}}
{{- $name := include "ipars.fullname" . -}}
{{- $serviceAccountName := include "ipars.serviceAccountName" . -}}
{{- $serviceAccountNamespace := .Release.Namespace -}}
{{- if .Values.serviceExposure.namespaces -}}
{{- range $index, $namespace := .Values.serviceExposure.namespaces }}
{{- if gt $index 0 }}
---
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: {{ include "ipars.name" $root | quote }}
    app.kubernetes.io/instance: {{ $root.Release.Name | quote }}
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}
  namespace: {{ $namespace }}
  labels:
    app.kubernetes.io/name: {{ include "ipars.name" $root | quote }}
    app.kubernetes.io/instance: {{ $root.Release.Name | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ $serviceAccountName }}
    namespace: {{ $serviceAccountNamespace }}
{{- end }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ include "ipars.name" $root | quote }}
    app.kubernetes.io/instance: {{ $root.Release.Name | quote }}
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ include "ipars.name" $root | quote }}
    app.kubernetes.io/instance: {{ $root.Release.Name | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ $serviceAccountName }}
    namespace: {{ $serviceAccountNamespace }}
{{- end }}
{{- end }}
