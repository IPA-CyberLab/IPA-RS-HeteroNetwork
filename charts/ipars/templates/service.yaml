{{- if and $relayServiceActive (ne $relayHealthCheckNodePort 0) (or (eq $relayHealthCheckNodePort $relayUdpNodePort) (eq $relayHealthCheckNodePort $relayHttpNodePort)) -}}
{{- fail "agent.relayService.healthCheckNodePort must differ from relay NodePorts" -}}
