{{- if and $relayServiceActive (ne $relayIpFamilyPolicy "") (not (or (eq $relayIpFamilyPolicy "SingleStack") $relayIpFamilyPolicyDual)) -}}
{{- fail "agent.relayService.ipFamilyPolicy must be SingleStack, PreferDualStack, or RequireDualStack" -}}
