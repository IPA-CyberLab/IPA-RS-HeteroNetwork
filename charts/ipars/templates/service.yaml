{{- $agentApiExternal := or (eq .Values.agent.apiService.type "NodePort") (eq .Values.agent.apiService.type "LoadBalancer") -}}
{{- $relayExternal := or (eq .Values.agent.relayService.type "NodePort") (eq .Values.agent.relayService.type "LoadBalancer") -}}
{{- $agentApiServiceTypeValid := or (eq .Values.agent.apiService.type "ClusterIP") (eq .Values.agent.apiService.type "NodePort") (eq .Values.agent.apiService.type "LoadBalancer") -}}
{{- $relayServiceTypeValid := or (eq .Values.agent.relayService.type "ClusterIP") (eq .Values.agent.relayService.type "NodePort") (eq .Values.agent.relayService.type "LoadBalancer") -}}
{{- $agentApiExternalTrafficPolicyValid := or (eq .Values.agent.apiService.externalTrafficPolicy "Local") (eq .Values.agent.apiService.externalTrafficPolicy "Cluster") -}}
{{- $relayExternalTrafficPolicyValid := or (eq .Values.agent.relayService.externalTrafficPolicy "Local") (eq .Values.agent.relayService.externalTrafficPolicy "Cluster") -}}
{{- $relayServiceActive := and .Values.agent.relayService.enabled .Values.agent.relayAdvertisement.enabled -}}
{{- $agentApiPort := int .Values.agent.apiService.port -}}
{{- $agentApiNodePort := int .Values.agent.apiService.nodePort -}}
{{- $agentApiLoadBalancerClass := .Values.agent.apiService.loadBalancerClass -}}
{{- $relayUdpPort := int .Values.agent.relayService.udpPort -}}
{{- $relayHttpPort := int .Values.agent.relayService.httpPort -}}
{{- $relayUdpNodePort := int .Values.agent.relayService.udpNodePort -}}
{{- $relayHttpNodePort := int .Values.agent.relayService.httpNodePort -}}
{{- $relayLoadBalancerClass := .Values.agent.relayService.loadBalancerClass -}}
{{- if and .Values.agent.apiService.enabled (not $agentApiServiceTypeValid) -}}
{{- fail "agent.apiService.type must be one of ClusterIP, NodePort, or LoadBalancer" -}}
{{- end -}}
{{- if and $relayServiceActive (not $relayServiceTypeValid) -}}
{{- fail "agent.relayService.type must be one of ClusterIP, NodePort, or LoadBalancer" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled (or (lt $agentApiPort 1) (gt $agentApiPort 65535)) -}}
{{- fail "agent.apiService.port must be between 1 and 65535" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled (ne $agentApiNodePort 0) (not $agentApiExternal) -}}
{{- fail "agent.apiService.nodePort requires agent.apiService.type NodePort or LoadBalancer" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled (ne $agentApiNodePort 0) (or (lt $agentApiNodePort 30000) (gt $agentApiNodePort 32767)) -}}
{{- fail "agent.apiService.nodePort must be 0 or between 30000 and 32767" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled (ne $agentApiLoadBalancerClass "") (ne .Values.agent.apiService.type "LoadBalancer") -}}
{{- fail "agent.apiService.loadBalancerClass requires agent.apiService.type LoadBalancer" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled (ne $agentApiLoadBalancerClass "") -}}
{{- include "ipars.validateOptionalQualifiedNameWithPrefix" (dict "path" "agent.apiService.loadBalancerClass" "value" $agentApiLoadBalancerClass) -}}
{{- end -}}
{{- if and $relayServiceActive (or (lt $relayUdpPort 1) (gt $relayUdpPort 65535)) -}}
{{- fail "agent.relayService.udpPort must be between 1 and 65535" -}}
{{- end -}}
{{- if and $relayServiceActive (or (lt $relayHttpPort 1) (gt $relayHttpPort 65535)) -}}
{{- fail "agent.relayService.httpPort must be between 1 and 65535" -}}
{{- end -}}
{{- if and $relayServiceActive (or (ne $relayUdpNodePort 0) (ne $relayHttpNodePort 0)) (not $relayExternal) -}}
{{- fail "agent.relayService udpNodePort/httpNodePort require agent.relayService.type NodePort or LoadBalancer" -}}
{{- end -}}
{{- if and $relayServiceActive (ne $relayUdpNodePort 0) (or (lt $relayUdpNodePort 30000) (gt $relayUdpNodePort 32767)) -}}
{{- fail "agent.relayService.udpNodePort must be 0 or between 30000 and 32767" -}}
{{- end -}}
{{- if and $relayServiceActive (ne $relayHttpNodePort 0) (or (lt $relayHttpNodePort 30000) (gt $relayHttpNodePort 32767)) -}}
{{- fail "agent.relayService.httpNodePort must be 0 or between 30000 and 32767" -}}
{{- end -}}
{{- if and $relayServiceActive (ne $relayUdpNodePort 0) (eq $relayUdpNodePort $relayHttpNodePort) -}}
{{- fail "agent.relayService.udpNodePort and agent.relayService.httpNodePort must be different" -}}
{{- end -}}
{{- if and $relayServiceActive (ne $relayLoadBalancerClass "") (ne .Values.agent.relayService.type "LoadBalancer") -}}
{{- fail "agent.relayService.loadBalancerClass requires agent.relayService.type LoadBalancer" -}}
{{- end -}}
{{- if and $relayServiceActive (ne $relayLoadBalancerClass "") -}}
{{- include "ipars.validateOptionalQualifiedNameWithPrefix" (dict "path" "agent.relayService.loadBalancerClass" "value" $relayLoadBalancerClass) -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled $agentApiExternal (not $agentApiExternalTrafficPolicyValid) -}}
{{- fail "agent.apiService.externalTrafficPolicy must be Local or Cluster" -}}
{{- end -}}
{{- if and $relayServiceActive $relayExternal (not $relayExternalTrafficPolicyValid) -}}
{{- fail "agent.relayService.externalTrafficPolicy must be Local or Cluster" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled $agentApiExternal (not .Values.agent.apiService.exposureAcknowledged) -}}
{{- fail "agent.apiService external exposure requires agent.apiService.exposureAcknowledged=true" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled (eq .Values.agent.apiService.type "LoadBalancer") (not .Values.agent.apiService.loadBalancerSourceRanges) (not .Values.agent.apiService.allowUnrestrictedLoadBalancer) -}}
{{- fail "agent.apiService LoadBalancer exposure requires agent.apiService.loadBalancerSourceRanges or agent.apiService.allowUnrestrictedLoadBalancer=true" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled $agentApiExternal (eq .Values.agent.apiService.externalTrafficPolicy "Cluster") (not .Values.agent.apiService.allowClusterExternalTrafficPolicy) -}}
{{- fail "agent.apiService externalTrafficPolicy=Cluster requires agent.apiService.allowClusterExternalTrafficPolicy=true" -}}
{{- end -}}
{{- if .Values.agent.apiService.enabled -}}
{{- range $key, $_ := .Values.agent.apiService.annotations -}}
{{- include "ipars.validateAnnotationKey" (dict "path" "agent.apiService.annotations" "key" $key) -}}
{{- end -}}
{{- end -}}
{{- if and $relayServiceActive $relayExternal (not .Values.agent.relayService.exposureAcknowledged) -}}
{{- fail "agent.relayService external exposure requires agent.relayService.exposureAcknowledged=true" -}}
{{- end -}}
{{- if and $relayServiceActive (eq .Values.agent.relayService.type "LoadBalancer") (not .Values.agent.relayService.loadBalancerSourceRanges) (not .Values.agent.relayService.allowUnrestrictedLoadBalancer) -}}
{{- fail "agent.relayService LoadBalancer exposure requires agent.relayService.loadBalancerSourceRanges or agent.relayService.allowUnrestrictedLoadBalancer=true" -}}
{{- end -}}
{{- if and $relayServiceActive $relayExternal (eq .Values.agent.relayService.externalTrafficPolicy "Cluster") (not .Values.agent.relayService.allowClusterExternalTrafficPolicy) -}}
{{- fail "agent.relayService externalTrafficPolicy=Cluster requires agent.relayService.allowClusterExternalTrafficPolicy=true" -}}
{{- end -}}
{{- if $relayServiceActive -}}
{{- range $key, $_ := .Values.agent.relayService.annotations -}}
{{- include "ipars.validateAnnotationKey" (dict "path" "agent.relayService.annotations" "key" $key) -}}
{{- end -}}
{{- end -}}
{{- if .Values.agent.apiService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ipars.fullname" . }}-agent
  labels:
    app.kubernetes.io/name: {{ include "ipars.name" . }}
    app.kubernetes.io/component: agent
  {{- with .Values.agent.apiService.annotations }}
  annotations:
{{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.agent.apiService.type }}
  {{- if and (eq .Values.agent.apiService.type "LoadBalancer") .Values.agent.apiService.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
{{- toYaml .Values.agent.apiService.loadBalancerSourceRanges | nindent 4 }}
  {{- end }}
  {{- if and (eq .Values.agent.apiService.type "LoadBalancer") .Values.agent.apiService.loadBalancerClass }}
  loadBalancerClass: {{ .Values.agent.apiService.loadBalancerClass | quote }}
  {{- end }}
  {{- if $agentApiExternal }}
  externalTrafficPolicy: {{ .Values.agent.apiService.externalTrafficPolicy }}
  {{- end }}
  selector:
    app.kubernetes.io/name: {{ include "ipars.name" . }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.agent.apiService.port }}
      targetPort: 9780
      {{- if and $agentApiExternal (ne $agentApiNodePort 0) }}
      nodePort: {{ $agentApiNodePort }}
      {{- end }}
{{- end }}
{{- if and .Values.agent.relayService.enabled .Values.agent.relayAdvertisement.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ipars.fullname" . }}-relay
  labels:
    app.kubernetes.io/name: {{ include "ipars.name" . }}
    app.kubernetes.io/component: relay
  {{- with .Values.agent.relayService.annotations }}
  annotations:
{{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.agent.relayService.type }}
  {{- if and (eq .Values.agent.relayService.type "LoadBalancer") .Values.agent.relayService.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
{{- toYaml .Values.agent.relayService.loadBalancerSourceRanges | nindent 4 }}
  {{- end }}
  {{- if and (eq .Values.agent.relayService.type "LoadBalancer") .Values.agent.relayService.loadBalancerClass }}
  loadBalancerClass: {{ .Values.agent.relayService.loadBalancerClass | quote }}
  {{- end }}
  {{- if $relayExternal }}
  externalTrafficPolicy: {{ .Values.agent.relayService.externalTrafficPolicy }}
  {{- end }}
  selector:
    app.kubernetes.io/name: {{ include "ipars.name" . }}
  ports:
    - name: relay-udp
      protocol: UDP
      port: {{ .Values.agent.relayService.udpPort }}
      targetPort: {{ .Values.agent.relayService.udpPort }}
      {{- if and $relayExternal (ne $relayUdpNodePort 0) }}
      nodePort: {{ $relayUdpNodePort }}
      {{- end }}
    - name: relay-http
      protocol: TCP
      port: {{ .Values.agent.relayService.httpPort }}
      targetPort: {{ .Values.agent.relayService.httpPort }}
      {{- if and $relayExternal (ne $relayHttpNodePort 0) }}
      nodePort: {{ $relayHttpNodePort }}
      {{- end }}
{{- end }}
