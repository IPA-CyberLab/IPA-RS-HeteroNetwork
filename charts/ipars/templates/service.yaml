{{- fail "agent.relayService.healthCheckNodePort must be 0 or between 30000 and 32767" -}}
{{- end -}}
{{- if and $relayServiceActive (ne $relayHealthCheckNodePort 0) (ne .Values.agent.relayService.externalTrafficPolicy "Local") -}}
{{- fail "agent.relayService.healthCheckNodePort requires agent.relayService.externalTrafficPolicy Local" -}}
{{- end -}}
{{- if and $relayServiceActive (ne $relayHealthCheckNodePort 0) (or (eq $relayHealthCheckNodePort $relayUdpNodePort) (eq $relayHealthCheckNodePort $relayHttpNodePort)) -}}
{{- fail "agent.relayService.healthCheckNodePort must differ from relay NodePorts" -}}
{{- end -}}
{{- $explicitNodePorts := dict -}}
{{- if and .Values.agent.apiService.enabled (ne $agentApiNodePort 0) -}}
{{- $_ := set $explicitNodePorts (printf "%d" $agentApiNodePort) "agent.apiService.nodePort" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled (ne $agentApiHealthCheckNodePort 0) -}}
{{- $portKey := printf "%d" $agentApiHealthCheckNodePort -}}
{{- if hasKey $explicitNodePorts $portKey -}}
{{- fail (printf "agent.apiService.healthCheckNodePort must not reuse Kubernetes NodePort %d already assigned to %s" $agentApiHealthCheckNodePort (get $explicitNodePorts $portKey)) -}}
{{- end -}}
{{- $_ := set $explicitNodePorts $portKey "agent.apiService.healthCheckNodePort" -}}
{{- end -}}
{{- if and $relayServiceActive (ne $relayUdpNodePort 0) -}}
{{- $portKey := printf "%d" $relayUdpNodePort -}}
{{- if hasKey $explicitNodePorts $portKey -}}
{{- fail (printf "agent.relayService.udpNodePort must not reuse Kubernetes NodePort %d already assigned to %s" $relayUdpNodePort (get $explicitNodePorts $portKey)) -}}
{{- end -}}
{{- $_ := set $explicitNodePorts $portKey "agent.relayService.udpNodePort" -}}
{{- end -}}
{{- if and $relayServiceActive (ne $relayHttpNodePort 0) -}}
{{- $portKey := printf "%d" $relayHttpNodePort -}}
{{- if hasKey $explicitNodePorts $portKey -}}
{{- fail (printf "agent.relayService.httpNodePort must not reuse Kubernetes NodePort %d already assigned to %s" $relayHttpNodePort (get $explicitNodePorts $portKey)) -}}
{{- end -}}
{{- $_ := set $explicitNodePorts $portKey "agent.relayService.httpNodePort" -}}
{{- end -}}
{{- if and $relayServiceActive (ne $relayHealthCheckNodePort 0) -}}
{{- $portKey := printf "%d" $relayHealthCheckNodePort -}}
{{- if hasKey $explicitNodePorts $portKey -}}
{{- fail (printf "agent.relayService.healthCheckNodePort must not reuse Kubernetes NodePort %d already assigned to %s" $relayHealthCheckNodePort (get $explicitNodePorts $portKey)) -}}
{{- end -}}
{{- $_ := set $explicitNodePorts $portKey "agent.relayService.healthCheckNodePort" -}}
{{- end -}}
{{- if and $relayServiceActive (not $relayAllocateLoadBalancerNodePorts) (ne .Values.agent.relayService.type "LoadBalancer") -}}
{{- fail "agent.relayService.allocateLoadBalancerNodePorts=false requires agent.relayService.type LoadBalancer" -}}
{{- end -}}
{{- if and $relayServiceActive (not $relayAllocateLoadBalancerNodePorts) (or (ne $relayUdpNodePort 0) (ne $relayHttpNodePort 0)) -}}
{{- fail "agent.relayService.allocateLoadBalancerNodePorts=false cannot be combined with relay NodePorts" -}}
{{- end -}}
{{- if and $relayServiceActive (ne $relayIpFamilyPolicy "") (not (or (eq $relayIpFamilyPolicy "SingleStack") $relayIpFamilyPolicyDual)) -}}
{{- fail "agent.relayService.ipFamilyPolicy must be SingleStack, PreferDualStack, or RequireDualStack" -}}
{{- end -}}
{{- if and $relayServiceActive (gt (len $relayIpFamilies) 2) -}}
{{- fail "agent.relayService.ipFamilies accepts at most two values" -}}
{{- end -}}
{{- if $relayServiceActive -}}
{{- range $family := $relayIpFamilies -}}
{{- if not (or (eq $family "IPv4") (eq $family "IPv6")) -}}
{{- fail "agent.relayService.ipFamilies values must be IPv4 or IPv6" -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- if and $relayServiceActive (eq (len $relayIpFamilies) 2) (eq (index $relayIpFamilies 0) (index $relayIpFamilies 1)) -}}
{{- fail "agent.relayService.ipFamilies cannot repeat the same family" -}}
{{- end -}}
{{- if and $relayServiceActive (eq $relayIpFamilyPolicy "SingleStack") (gt (len $relayIpFamilies) 1) -}}
{{- fail "agent.relayService.ipFamilyPolicy=SingleStack cannot use both IPv4 and IPv6" -}}
{{- end -}}
{{- if and $relayServiceActive (eq $relayIpFamilyPolicy "RequireDualStack") (ne (len $relayIpFamilies) 2) -}}
{{- fail "agent.relayService.ipFamilyPolicy=RequireDualStack requires both IPv4 and IPv6 families" -}}
{{- end -}}
{{- if and $relayServiceActive (eq (len $relayIpFamilies) 2) (not $relayIpFamilyPolicyDual) -}}
{{- fail "agent.relayService ipFamilies with both IPv4 and IPv6 require ipFamilyPolicy=PreferDualStack or RequireDualStack" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled (not $agentApiInternalTrafficPolicyValid) -}}
{{- fail "agent.apiService.internalTrafficPolicy must be Local or Cluster" -}}
{{- end -}}
{{- if and $relayServiceActive (not $relayInternalTrafficPolicyValid) -}}
{{- fail "agent.relayService.internalTrafficPolicy must be Local or Cluster" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled (not $agentApiTrafficDistributionValid) -}}
{{- fail "agent.apiService.trafficDistribution must be PreferSameZone, PreferSameNode, or PreferClose" -}}
{{- end -}}
{{- if and $relayServiceActive (not $relayTrafficDistributionValid) -}}
{{- fail "agent.relayService.trafficDistribution must be PreferSameZone, PreferSameNode, or PreferClose" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled (not $agentApiSessionAffinityValid) -}}
{{- fail "agent.apiService.sessionAffinity must be None or ClientIP" -}}
{{- end -}}
{{- if and $relayServiceActive (not $relaySessionAffinityValid) -}}
{{- fail "agent.relayService.sessionAffinity must be None or ClientIP" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled (ne $agentApiSessionAffinityTimeoutSeconds 0) (or (lt $agentApiSessionAffinityTimeoutSeconds 1) (gt $agentApiSessionAffinityTimeoutSeconds 86400)) -}}
{{- fail "agent.apiService.sessionAffinityTimeoutSeconds must be 0 or between 1 and 86400" -}}
{{- end -}}
{{- if and $relayServiceActive (ne $relaySessionAffinityTimeoutSeconds 0) (or (lt $relaySessionAffinityTimeoutSeconds 1) (gt $relaySessionAffinityTimeoutSeconds 86400)) -}}
{{- fail "agent.relayService.sessionAffinityTimeoutSeconds must be 0 or between 1 and 86400" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled (ne $agentApiSessionAffinityTimeoutSeconds 0) (ne .Values.agent.apiService.sessionAffinity "ClientIP") -}}
{{- fail "agent.apiService.sessionAffinityTimeoutSeconds requires agent.apiService.sessionAffinity ClientIP" -}}
{{- end -}}
{{- if and $relayServiceActive (ne $relaySessionAffinityTimeoutSeconds 0) (ne .Values.agent.relayService.sessionAffinity "ClientIP") -}}
{{- fail "agent.relayService.sessionAffinityTimeoutSeconds requires agent.relayService.sessionAffinity ClientIP" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled $agentApiExternal (not $agentApiExternalTrafficPolicyValid) -}}
{{- fail "agent.apiService.externalTrafficPolicy must be Local or Cluster" -}}
{{- end -}}
{{- if and $relayServiceActive $relayExternal (not $relayExternalTrafficPolicyValid) -}}
{{- fail "agent.relayService.externalTrafficPolicy must be Local or Cluster" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled $agentApiExternal (not .Values.agent.apiService.exposureAcknowledged) -}}
{{- fail "agent.apiService external exposure requires agent.apiService.exposureAcknowledged=true" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled $agentApiExternalIPs (not .Values.agent.apiService.exposureAcknowledged) -}}
{{- fail "agent.apiService.externalIPs require agent.apiService.exposureAcknowledged=true" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled .Values.agent.apiService.exposureAcknowledged (not $agentApiExternal) (not $agentApiExternalIPs) -}}
{{- fail "agent.apiService.exposureAcknowledged=true requires external Service type or externalIPs" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled (eq .Values.agent.apiService.type "LoadBalancer") (not .Values.agent.apiService.loadBalancerSourceRanges) (not .Values.agent.apiService.allowUnrestrictedLoadBalancer) -}}
{{- fail "agent.apiService LoadBalancer exposure requires agent.apiService.loadBalancerSourceRanges or agent.apiService.allowUnrestrictedLoadBalancer=true" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled $agentApiExternal (eq .Values.agent.apiService.externalTrafficPolicy "Cluster") (not .Values.agent.apiService.allowClusterExternalTrafficPolicy) -}}
{{- fail "agent.apiService externalTrafficPolicy=Cluster requires agent.apiService.allowClusterExternalTrafficPolicy=true" -}}
{{- end -}}
{{- if and .Values.agent.apiService.enabled .Values.agent.apiService.allowClusterExternalTrafficPolicy (or (not $agentApiExternal) (ne .Values.agent.apiService.externalTrafficPolicy "Cluster")) -}}
{{- fail "agent.apiService.allowClusterExternalTrafficPolicy=true requires NodePort or LoadBalancer type with externalTrafficPolicy=Cluster" -}}
{{- end -}}
{{- if .Values.agent.apiService.enabled -}}
{{- range $key, $value := .Values.agent.apiService.annotations -}}
{{- include "ipars.validateAnnotationKey" (dict "path" "agent.apiService.annotations" "key" $key) -}}
{{- include "ipars.validateAnnotationValue" (dict "path" (printf "agent.apiService.annotations.%s" $key) "value" $value) -}}
{{- end -}}
{{- end -}}
{{- if and $relayServiceActive $relayExternal (not .Values.agent.relayService.exposureAcknowledged) -}}
{{- fail "agent.relayService external exposure requires agent.relayService.exposureAcknowledged=true" -}}
{{- end -}}
{{- if and $relayServiceActive $relayExternalIPs (not .Values.agent.relayService.exposureAcknowledged) -}}
{{- fail "agent.relayService.externalIPs require agent.relayService.exposureAcknowledged=true" -}}
{{- end -}}
{{- if and $relayServiceActive .Values.agent.relayService.exposureAcknowledged (not $relayExternal) (not $relayExternalIPs) -}}
{{- fail "agent.relayService.exposureAcknowledged=true requires external Service type or externalIPs" -}}
{{- end -}}
{{- if and $relayServiceActive (eq .Values.agent.relayService.type "LoadBalancer") (not .Values.agent.relayService.loadBalancerSourceRanges) (not .Values.agent.relayService.allowUnrestrictedLoadBalancer) -}}
{{- fail "agent.relayService LoadBalancer exposure requires agent.relayService.loadBalancerSourceRanges or agent.relayService.allowUnrestrictedLoadBalancer=true" -}}
{{- end -}}
{{- if and $relayServiceActive $relayExternal (eq .Values.agent.relayService.externalTrafficPolicy "Cluster") (not .Values.agent.relayService.allowClusterExternalTrafficPolicy) -}}
{{- fail "agent.relayService externalTrafficPolicy=Cluster requires agent.relayService.allowClusterExternalTrafficPolicy=true" -}}
{{- end -}}
{{- if and $relayServiceActive .Values.agent.relayService.allowClusterExternalTrafficPolicy (or (not $relayExternal) (ne .Values.agent.relayService.externalTrafficPolicy "Cluster")) -}}
{{- fail "agent.relayService.allowClusterExternalTrafficPolicy=true requires NodePort or LoadBalancer type with externalTrafficPolicy=Cluster" -}}
{{- end -}}
{{- if $relayServiceActive -}}
{{- range $key, $value := .Values.agent.relayService.annotations -}}
{{- include "ipars.validateAnnotationKey" (dict "path" "agent.relayService.annotations" "key" $key) -}}
{{- include "ipars.validateAnnotationValue" (dict "path" (printf "agent.relayService.annotations.%s" $key) "value" $value) -}}
{{- end -}}
{{- end -}}
{{- if .Values.agent.apiService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ipars.fullname" . }}-agent
  labels:
    app.kubernetes.io/name: {{ include "ipars.name" . }}
    app.kubernetes.io/component: agent
  {{- with .Values.agent.apiService.annotations }}
  annotations:
{{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.agent.apiService.type }}
  {{- if .Values.agent.apiService.clusterIP }}
  clusterIP: {{ .Values.agent.apiService.clusterIP | quote }}
  {{- end }}
  {{- if .Values.agent.apiService.clusterIPs }}
  clusterIPs:
{{- toYaml .Values.agent.apiService.clusterIPs | nindent 4 }}
  {{- end }}
  {{- if and (eq .Values.agent.apiService.type "LoadBalancer") .Values.agent.apiService.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
{{- toYaml .Values.agent.apiService.loadBalancerSourceRanges | nindent 4 }}
  {{- end }}
  {{- if and (eq .Values.agent.apiService.type "LoadBalancer") .Values.agent.apiService.loadBalancerClass }}
  loadBalancerClass: {{ .Values.agent.apiService.loadBalancerClass | quote }}
  {{- end }}
  {{- if and (eq .Values.agent.apiService.type "LoadBalancer") .Values.agent.apiService.loadBalancerIP }}
  loadBalancerIP: {{ .Values.agent.apiService.loadBalancerIP | quote }}
  {{- end }}
  {{- if .Values.agent.apiService.externalIPs }}
  externalIPs:
{{- toYaml .Values.agent.apiService.externalIPs | nindent 4 }}
  {{- end }}
  {{- if ne $agentApiHealthCheckNodePort 0 }}
  healthCheckNodePort: {{ $agentApiHealthCheckNodePort }}
  {{- end }}
  {{- if and (eq .Values.agent.apiService.type "LoadBalancer") (not .Values.agent.apiService.allocateLoadBalancerNodePorts) }}
  allocateLoadBalancerNodePorts: false
  {{- end }}
  {{- if $agentApiExternal }}
  externalTrafficPolicy: {{ .Values.agent.apiService.externalTrafficPolicy }}
  {{- end }}
  {{- if .Values.agent.apiService.ipFamilyPolicy }}
  ipFamilyPolicy: {{ .Values.agent.apiService.ipFamilyPolicy }}
  {{- end }}
  {{- if .Values.agent.apiService.ipFamilies }}
  ipFamilies:
{{- toYaml .Values.agent.apiService.ipFamilies | nindent 4 }}
  {{- end }}
  {{- if .Values.agent.apiService.internalTrafficPolicy }}
  internalTrafficPolicy: {{ .Values.agent.apiService.internalTrafficPolicy }}
  {{- end }}
  {{- if .Values.agent.apiService.trafficDistribution }}
  trafficDistribution: {{ .Values.agent.apiService.trafficDistribution }}
  {{- end }}
  {{- if .Values.agent.apiService.publishNotReadyAddresses }}
  publishNotReadyAddresses: true
  {{- end }}
  {{- if .Values.agent.apiService.sessionAffinity }}
  sessionAffinity: {{ .Values.agent.apiService.sessionAffinity }}
  {{- end }}
  {{- if and (eq .Values.agent.apiService.sessionAffinity "ClientIP") (ne $agentApiSessionAffinityTimeoutSeconds 0) }}
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: {{ $agentApiSessionAffinityTimeoutSeconds }}
  {{- end }}
  selector:
    app.kubernetes.io/name: {{ include "ipars.name" . }}
  ports:
    - name: http
      protocol: TCP
      {{- if .Values.agent.apiService.appProtocol }}
      appProtocol: {{ .Values.agent.apiService.appProtocol | quote }}
      {{- end }}
      port: {{ .Values.agent.apiService.port }}
      targetPort: 9780
      {{- if and $agentApiExternal (ne $agentApiNodePort 0) }}
      nodePort: {{ $agentApiNodePort }}
      {{- end }}
{{- end }}
{{- if and .Values.agent.relayService.enabled .Values.agent.relayAdvertisement.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ipars.fullname" . }}-relay
  labels:
    app.kubernetes.io/name: {{ include "ipars.name" . }}
    app.kubernetes.io/component: relay
  {{- with .Values.agent.relayService.annotations }}
  annotations:
{{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.agent.relayService.type }}
  {{- if .Values.agent.relayService.clusterIP }}
  clusterIP: {{ .Values.agent.relayService.clusterIP | quote }}
  {{- end }}
  {{- if .Values.agent.relayService.clusterIPs }}
  clusterIPs:
{{- toYaml .Values.agent.relayService.clusterIPs | nindent 4 }}
  {{- end }}
  {{- if and (eq .Values.agent.relayService.type "LoadBalancer") .Values.agent.relayService.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
{{- toYaml .Values.agent.relayService.loadBalancerSourceRanges | nindent 4 }}
  {{- end }}
  {{- if and (eq .Values.agent.relayService.type "LoadBalancer") .Values.agent.relayService.loadBalancerClass }}
  loadBalancerClass: {{ .Values.agent.relayService.loadBalancerClass | quote }}
  {{- end }}
  {{- if and (eq .Values.agent.relayService.type "LoadBalancer") .Values.agent.relayService.loadBalancerIP }}
  loadBalancerIP: {{ .Values.agent.relayService.loadBalancerIP | quote }}
  {{- end }}
  {{- if .Values.agent.relayService.externalIPs }}
  externalIPs:
{{- toYaml .Values.agent.relayService.externalIPs | nindent 4 }}
  {{- end }}
  {{- if ne $relayHealthCheckNodePort 0 }}
  healthCheckNodePort: {{ $relayHealthCheckNodePort }}
  {{- end }}
  {{- if and (eq .Values.agent.relayService.type "LoadBalancer") (not .Values.agent.relayService.allocateLoadBalancerNodePorts) }}
  allocateLoadBalancerNodePorts: false
  {{- end }}
  {{- if $relayExternal }}
  externalTrafficPolicy: {{ .Values.agent.relayService.externalTrafficPolicy }}
  {{- end }}
  {{- if .Values.agent.relayService.ipFamilyPolicy }}
  ipFamilyPolicy: {{ .Values.agent.relayService.ipFamilyPolicy }}
  {{- end }}
  {{- if .Values.agent.relayService.ipFamilies }}
  ipFamilies:
{{- toYaml .Values.agent.relayService.ipFamilies | nindent 4 }}
  {{- end }}
  {{- if .Values.agent.relayService.internalTrafficPolicy }}
  internalTrafficPolicy: {{ .Values.agent.relayService.internalTrafficPolicy }}
  {{- end }}
  {{- if .Values.agent.relayService.trafficDistribution }}
  trafficDistribution: {{ .Values.agent.relayService.trafficDistribution }}
  {{- end }}
  {{- if .Values.agent.relayService.publishNotReadyAddresses }}
  publishNotReadyAddresses: true
  {{- end }}
  {{- if .Values.agent.relayService.sessionAffinity }}
  sessionAffinity: {{ .Values.agent.relayService.sessionAffinity }}
  {{- end }}
  {{- if and (eq .Values.agent.relayService.sessionAffinity "ClientIP") (ne $relaySessionAffinityTimeoutSeconds 0) }}
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: {{ $relaySessionAffinityTimeoutSeconds }}
  {{- end }}
  selector:
    app.kubernetes.io/name: {{ include "ipars.name" . }}
  ports:
    - name: relay-udp
      protocol: UDP
      {{- if .Values.agent.relayService.udpAppProtocol }}
      appProtocol: {{ .Values.agent.relayService.udpAppProtocol | quote }}
      {{- end }}
      port: {{ .Values.agent.relayService.udpPort }}
      targetPort: {{ .Values.agent.relayService.udpPort }}
      {{- if and $relayExternal (ne $relayUdpNodePort 0) }}
      nodePort: {{ $relayUdpNodePort }}
      {{- end }}
    - name: relay-http
      protocol: TCP
      {{- if .Values.agent.relayService.httpAppProtocol }}
      appProtocol: {{ .Values.agent.relayService.httpAppProtocol | quote }}
      {{- end }}
      port: {{ .Values.agent.relayService.httpPort }}
      targetPort: {{ .Values.agent.relayService.httpPort }}
      {{- if and $relayExternal (ne $relayHttpNodePort 0) }}
      nodePort: {{ $relayHttpNodePort }}
      {{- end }}
{{- end }}
