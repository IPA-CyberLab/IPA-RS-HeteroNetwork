{{- if .Values.agent.apiService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ipars.fullname" . }}-agent
  labels:
    app.kubernetes.io/name: {{ include "ipars.name" . }}
    app.kubernetes.io/component: agent
  {{- with .Values.agent.apiService.annotations }}
  annotations:
{{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.agent.apiService.type }}
  {{- if and (eq .Values.agent.apiService.type "LoadBalancer") .Values.agent.apiService.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
{{- toYaml .Values.agent.apiService.loadBalancerSourceRanges | nindent 4 }}
  {{- end }}
  {{- if and (eq .Values.agent.apiService.type "LoadBalancer") .Values.agent.apiService.loadBalancerClass }}
  loadBalancerClass: {{ .Values.agent.apiService.loadBalancerClass | quote }}
  {{- end }}
  {{- if ne $agentApiHealthCheckNodePort 0 }}
  healthCheckNodePort: {{ $agentApiHealthCheckNodePort }}
  {{- end }}
  {{- if and (eq .Values.agent.apiService.type "LoadBalancer") (not .Values.agent.apiService.allocateLoadBalancerNodePorts) }}
  allocateLoadBalancerNodePorts: false
  {{- end }}
  {{- if $agentApiExternal }}
  externalTrafficPolicy: {{ .Values.agent.apiService.externalTrafficPolicy }}
  {{- end }}
  {{- if .Values.agent.apiService.ipFamilyPolicy }}
  ipFamilyPolicy: {{ .Values.agent.apiService.ipFamilyPolicy }}
  {{- end }}
  {{- if .Values.agent.apiService.ipFamilies }}
  ipFamilies:
{{- toYaml .Values.agent.apiService.ipFamilies | nindent 4 }}
  {{- end }}
  {{- if .Values.agent.apiService.internalTrafficPolicy }}
  internalTrafficPolicy: {{ .Values.agent.apiService.internalTrafficPolicy }}
  {{- end }}
  {{- if .Values.agent.apiService.sessionAffinity }}
  sessionAffinity: {{ .Values.agent.apiService.sessionAffinity }}
  {{- end }}
  {{- if and (eq .Values.agent.apiService.sessionAffinity "ClientIP") (ne $agentApiSessionAffinityTimeoutSeconds 0) }}
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: {{ $agentApiSessionAffinityTimeoutSeconds }}
  {{- end }}
  selector:
    app.kubernetes.io/name: {{ include "ipars.name" . }}
  ports:
    - name: http
      protocol: TCP
      {{- if .Values.agent.apiService.appProtocol }}
      appProtocol: {{ .Values.agent.apiService.appProtocol | quote }}
      {{- end }}
      port: {{ .Values.agent.apiService.port }}
      targetPort: 9780
      {{- if and $agentApiExternal (ne $agentApiNodePort 0) }}
      nodePort: {{ $agentApiNodePort }}
      {{- end }}
{{- end }}
{{- if and .Values.agent.relayService.enabled .Values.agent.relayAdvertisement.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ipars.fullname" . }}-relay
  labels:
    app.kubernetes.io/name: {{ include "ipars.name" . }}
    app.kubernetes.io/component: relay
  {{- with .Values.agent.relayService.annotations }}
  annotations:
{{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.agent.relayService.type }}
  {{- if and (eq .Values.agent.relayService.type "LoadBalancer") .Values.agent.relayService.loadBalancerSourceRanges }}
  loadBalancerSourceRanges:
{{- toYaml .Values.agent.relayService.loadBalancerSourceRanges | nindent 4 }}
  {{- end }}
  {{- if and (eq .Values.agent.relayService.type "LoadBalancer") .Values.agent.relayService.loadBalancerClass }}
  loadBalancerClass: {{ .Values.agent.relayService.loadBalancerClass | quote }}
  {{- end }}
  {{- if ne $relayHealthCheckNodePort 0 }}
  healthCheckNodePort: {{ $relayHealthCheckNodePort }}
  {{- end }}
  {{- if and (eq .Values.agent.relayService.type "LoadBalancer") (not .Values.agent.relayService.allocateLoadBalancerNodePorts) }}
  allocateLoadBalancerNodePorts: false
  {{- end }}
  {{- if $relayExternal }}
  externalTrafficPolicy: {{ .Values.agent.relayService.externalTrafficPolicy }}
  {{- end }}
  {{- if .Values.agent.relayService.ipFamilyPolicy }}
  ipFamilyPolicy: {{ .Values.agent.relayService.ipFamilyPolicy }}
  {{- end }}
  {{- if .Values.agent.relayService.ipFamilies }}
  ipFamilies:
{{- toYaml .Values.agent.relayService.ipFamilies | nindent 4 }}
  {{- end }}
  {{- if .Values.agent.relayService.internalTrafficPolicy }}
  internalTrafficPolicy: {{ .Values.agent.relayService.internalTrafficPolicy }}
  {{- end }}
  {{- if .Values.agent.relayService.sessionAffinity }}
  sessionAffinity: {{ .Values.agent.relayService.sessionAffinity }}
  {{- end }}
  {{- if and (eq .Values.agent.relayService.sessionAffinity "ClientIP") (ne $relaySessionAffinityTimeoutSeconds 0) }}
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: {{ $relaySessionAffinityTimeoutSeconds }}
  {{- end }}
  selector:
    app.kubernetes.io/name: {{ include "ipars.name" . }}
  ports:
    - name: relay-udp
      protocol: UDP
      {{- if .Values.agent.relayService.udpAppProtocol }}
      appProtocol: {{ .Values.agent.relayService.udpAppProtocol | quote }}
      {{- end }}
      port: {{ .Values.agent.relayService.udpPort }}
      targetPort: {{ .Values.agent.relayService.udpPort }}
      {{- if and $relayExternal (ne $relayUdpNodePort 0) }}
      nodePort: {{ $relayUdpNodePort }}
      {{- end }}
    - name: relay-http
      protocol: TCP
      {{- if .Values.agent.relayService.httpAppProtocol }}
      appProtocol: {{ .Values.agent.relayService.httpAppProtocol | quote }}
      {{- end }}
      port: {{ .Values.agent.relayService.httpPort }}
      targetPort: {{ .Values.agent.relayService.httpPort }}
      {{- if and $relayExternal (ne $relayHttpNodePort 0) }}
      nodePort: {{ $relayHttpNodePort }}
      {{- end }}
{{- end }}
