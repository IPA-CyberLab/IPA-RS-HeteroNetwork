image:
  repository: ghcr.io/ipa-cyberlab/ipars
  tag: latest
  pullPolicy: IfNotPresent

cluster:
  controlPlaneUrl: "http://ipars-control-plane:8443"
  signalUrl: "http://ipars-signal:9443"
  stunEndpoint: ""
  relayEndpoint: "ipars-relay:51820"
  relayAdmissionUrl: "http://ipars-relay:9580"

agent:
  interfaceName: ipars0
  joinTokenSecretName: ipars-join-token
  joinTokenSecretKey: token
  routeProvider: false
  hostNetwork: true
  privileged: false
  relayForwarder:
    maxSessions: 1024
    restartBackoffSeconds: 5
    netns: ""

serviceExposure:
  enabled: true
  discoverServices: false
  apiServer: true
  discoverApiServer: true
  apiServerCidrs: []
  serviceCidrs:
    - 10.96.0.0/12
  namespaces: []
  serviceLabelSelector: ""
  routeProviderNodeId: ""
  routeIntervalSeconds: 60
