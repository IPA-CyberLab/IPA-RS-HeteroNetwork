image:
  repository: ghcr.io/ipa-cyberlab/ipars
  tag: latest
  pullPolicy: IfNotPresent

cluster:
  controlPlaneUrl: "http://ipars-control-plane:8443"
  signalUrl: "http://ipars-signal:9443"
  stunEndpoint: ""
  relayEndpoint: "ipars-relay:51820"
  relayAdmissionUrl: "http://ipars-relay:9580"

agent:
  interfaceName: ipars0
  joinTokenSecretName: ipars-join-token
  joinTokenSecretKey: token
  routeProvider: false
  hostNetwork: true
  privileged: false
  apiService:
    enabled: false
    exposureAcknowledged: false
    type: ClusterIP
    annotations: {}
    loadBalancerSourceRanges: []
    externalTrafficPolicy: Local
    port: 9780
  relayForwarder:
    maxSessions: 1024
    restartBackoffSeconds: 5
    netns: ""
  relayAdvertisement:
    enabled: false
    publicEndpoint: ""
    admissionUrl: ""
    statusUrl: ""
    maxSessions: 10000
    maxMbps: 1000
  relayService:
    enabled: false
    exposureAcknowledged: false
    type: LoadBalancer
    annotations: {}
    loadBalancerSourceRanges: []
    externalTrafficPolicy: Local
    udpPort: 51820
    httpPort: 9580

serviceExposure:
  enabled: true
  discoverServices: false
  apiServer: true
  discoverApiServer: true
  apiServerCidrs: []
  serviceCidrs:
    - 10.96.0.0/12
  namespaces: []
  serviceLabelSelector: ""
  routeProviderNodeId: ""
  routeIntervalSeconds: 60
