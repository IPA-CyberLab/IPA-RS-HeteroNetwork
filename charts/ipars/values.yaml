image:
  repository: ghcr.io/ipa-cyberlab/ipars
  tag: latest
  pullPolicy: IfNotPresent

cluster:
  controlPlaneUrl: "https://ipars-control-plane:8443"
  signalUrl: "https://ipars-signal:9443"
  stunEndpoint: ""
  relayEndpoint: "ipars-relay:51820"
  relayAdmissionUrl: "https://ipars-relay:9580"

agent:
  interfaceName: ipars0
  joinTokenSecretName: ipars-join-token
  routeProvider: false
  hostNetwork: true
  privileged: false

serviceExposure:
  enabled: true
  apiServer: true
  apiServerCidrs: []
  serviceCidrs:
    - 10.96.0.0/12
  routeProviderNodeId: ""
  routeIntervalSeconds: 60
