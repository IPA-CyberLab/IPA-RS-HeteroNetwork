image:
  repository: ghcr.io/ipa-cyberlab/ipars
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []

cluster:
  controlPlaneUrl: "http://ipars-control-plane:8443"
  signalUrl: "http://ipars-signal:9443"
  stunEndpoint: ""
  relayEndpoint: "ipars-relay:51820"
  relayAdmissionUrl: "http://ipars-relay:9580"

rbac:
  create: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

agent:
  interfaceName: ipars0
  joinTokenSecretName: ipars-join-token
  joinTokenSecretKey: token
  routeProvider: false
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet
  automountServiceAccountToken: true
  state:
    hostPath: /var/lib/ipars
    hostPathType: DirectoryOrCreate
    mountPath: /var/lib/ipars
  probes:
    liveness:
      enabled: true
      path: /healthz
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 1
      failureThreshold: 3
    readiness:
      enabled: true
      path: /healthz
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 1
      failureThreshold: 3
  terminationGracePeriodSeconds: ""
  privileged: false
  securityContext:
    allowPrivilegeEscalation: ""
    capabilities:
      add:
        - NET_ADMIN
        - NET_RAW
      drop: []
  podLabels: {}
  podAnnotations: {}
  priorityClassName: ""
  nodeSelector: {}
  tolerations: []
  resources:
    requests:
      cpu: ""
      memory: ""
    limits:
      cpu: ""
      memory: ""
  rollout:
    updateStrategy: ""
    maxUnavailable: ""
    maxSurge: ""
    minReadySeconds: ""
    revisionHistoryLimit: ""
  apiService:
    enabled: false
    exposureAcknowledged: false
    allowUnrestrictedLoadBalancer: false
    allowClusterExternalTrafficPolicy: false
    type: ClusterIP
    clusterIP: ""
    annotations: {}
    loadBalancerSourceRanges: []
    loadBalancerClass: ""
    loadBalancerIP: ""
    externalIPs: []
    healthCheckNodePort: 0
    allocateLoadBalancerNodePorts: true
    ipFamilyPolicy: ""
    ipFamilies: []
    internalTrafficPolicy: ""
    sessionAffinity: ""
    sessionAffinityTimeoutSeconds: 0
    externalTrafficPolicy: Local
    appProtocol: http
    publishNotReadyAddresses: false
    port: 9780
    nodePort: 0
  relayForwarder:
    maxSessions: 1024
    restartBackoffSeconds: 5
    netns: ""
  relayAdvertisement:
    enabled: false
    publicEndpoint: ""
    admissionUrl: ""
    statusUrl: ""
    maxSessions: 10000
    maxMbps: 1000
  relayService:
    enabled: false
    exposureAcknowledged: false
    allowUnrestrictedLoadBalancer: false
    allowClusterExternalTrafficPolicy: false
    type: LoadBalancer
    clusterIP: ""
    annotations: {}
    loadBalancerSourceRanges: []
    loadBalancerClass: ""
    loadBalancerIP: ""
    externalIPs: []
    healthCheckNodePort: 0
    allocateLoadBalancerNodePorts: true
    ipFamilyPolicy: ""
    ipFamilies: []
    internalTrafficPolicy: ""
    sessionAffinity: ""
    sessionAffinityTimeoutSeconds: 0
    externalTrafficPolicy: Local
    udpAppProtocol: ipars.io/relay-udp
    httpAppProtocol: http
    publishNotReadyAddresses: false
    udpPort: 51820
    httpPort: 9580
    udpNodePort: 0
    httpNodePort: 0

serviceExposure:
  enabled: true
  discoverServices: false
  apiServer: true
  discoverApiServer: true
  apiServerCidrs: []
  serviceCidrs:
    - 10.96.0.0/12
  namespaces: []
  serviceLabelSelector: ""
  routeProviderNodeId: ""
  routeIntervalSeconds: 60

networkPolicy:
  enabled: false
  acknowledgeHostNetwork: false
  agentApi:
    enabled: false
    allowedCidrs: []
  relay:
    enabled: false
    allowedCidrs: []
