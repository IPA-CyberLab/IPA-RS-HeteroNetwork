<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HeteroNetwork Console</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0f14;
        --panel: #111820;
        --panel-2: #17212b;
        --line: #2b3a48;
        --text: #e7edf3;
        --muted: #93a4b5;
        --good: #38d583;
        --warn: #f7bf45;
        --bad: #ff6b78;
        --info: #5cb7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      a {
        color: var(--info);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .page {
        width: min(1480px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 32px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.1;
        font-weight: 760;
      }

      .sub {
        margin-top: 7px;
        color: var(--muted);
        font-size: 13px;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 5px 9px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #10171f;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }

      .chip.good {
        border-color: color-mix(in oklab, var(--good) 45%, var(--line));
        color: var(--good);
      }

      .chip.warn {
        border-color: color-mix(in oklab, var(--warn) 45%, var(--line));
        color: var(--warn);
      }

      .chip.bad {
        border-color: color-mix(in oklab, var(--bad) 45%, var(--line));
        color: var(--bad);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(360px, 0.8fr);
        gap: 14px;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      section {
        border-top: 1px solid var(--line);
        padding-top: 14px;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 10px;
      }

      h2 {
        margin: 0;
        font-size: 15px;
        font-weight: 720;
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
      }

      .topology-scroll {
        width: 100%;
        overflow-x: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0d141b;
      }

      .topology {
        display: block;
        width: 100%;
        min-height: 420px;
      }

      .node-box {
        fill: #141e27;
        stroke: #354755;
        stroke-width: 1.2;
      }

      .node-title {
        fill: var(--text);
        font-size: 15px;
        font-weight: 760;
      }

      .node-meta {
        fill: var(--muted);
        font-size: 11px;
      }

      .edge-label {
        fill: #d8e2ed;
        font-size: 11px;
      }

      .edge-good {
        stroke: var(--good);
      }

      .edge-bad {
        stroke: var(--bad);
      }

      .edge-warn {
        stroke: var(--warn);
      }

      .edge-muted {
        stroke: #516273;
      }

      .table {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }

      .row {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr 0.8fr 1.2fr;
        min-height: 42px;
        border-top: 1px solid var(--line);
      }

      .row:first-child {
        border-top: 0;
      }

      .row.head {
        min-height: 34px;
        background: #121b24;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
      }

      .cell {
        min-width: 0;
        padding: 10px 12px;
        border-left: 1px solid var(--line);
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .cell:first-child {
        border-left: 0;
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: var(--muted);
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--muted);
      }

      .status.good {
        color: var(--good);
      }

      .status.good .dot {
        background: var(--good);
      }

      .status.warn {
        color: var(--warn);
      }

      .status.warn .dot {
        background: var(--warn);
      }

      .status.bad {
        color: var(--bad);
      }

      .status.bad .dot {
        background: var(--bad);
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .metric {
        min-height: 82px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 11px;
        background: var(--panel);
      }

      .metric strong {
        display: block;
        margin-top: 8px;
        font-size: 22px;
      }

      .metric span {
        color: var(--muted);
        font-size: 12px;
      }

      .notes {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 12px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .links {
        display: grid;
        gap: 8px;
      }

      .links a {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        min-height: 38px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 9px 11px;
        font-size: 13px;
      }

      .links span {
        color: var(--muted);
        overflow-wrap: anywhere;
        text-align: right;
      }

      @media (max-width: 1000px) {
        .layout,
        .topbar {
          grid-template-columns: 1fr;
          display: block;
        }

        .chips {
          justify-content: flex-start;
          margin-top: 12px;
        }

        .metrics {
          grid-template-columns: 1fr;
        }

        .table {
          overflow-x: auto;
        }

        .row {
          grid-template-columns: 1.1fr 0.9fr 0.8fr 1.2fr;
          min-width: 760px;
        }

        .topology {
          width: 880px;
        }

        .cell {
          border-left: 1px solid var(--line);
          border-top: 0;
        }

        .cell:first-child {
          border-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="topbar">
        <div>
          <h1>HeteroNetwork Console</h1>
          <div class="sub" id="subtitle">Loading runtime state...</div>
        </div>
        <div class="chips" id="chips"></div>
      </div>

      <div class="layout">
        <div class="stack">
          <section>
            <div class="section-title">
              <h2>Topology</h2>
              <span class="hint">Raw underlay and selected relay path</span>
            </div>
            <div class="topology-scroll">
              <svg class="topology" id="topology" viewBox="0 0 980 430" role="img" aria-label="HeteroNetwork topology"></svg>
            </div>
          </section>

          <section>
            <div class="section-title">
              <h2>Reachability</h2>
              <span class="hint">Last live check result</span>
            </div>
            <div class="table" id="checks"></div>
          </section>

          <section>
            <div class="section-title">
              <h2>Nodes</h2>
              <span class="hint">Sandbox and IPARS identity</span>
            </div>
            <div class="table" id="nodes"></div>
          </section>
        </div>

        <div class="stack">
          <section>
            <div class="section-title">
              <h2>Runtime</h2>
              <span class="hint">Control-plane snapshot</span>
            </div>
            <div class="metrics" id="metrics"></div>
          </section>

          <section>
            <div class="section-title">
              <h2>Paths</h2>
              <span class="hint">Control-plane selection</span>
            </div>
            <div class="table" id="paths"></div>
          </section>

          <section>
            <div class="section-title">
              <h2>Services</h2>
              <span class="hint">HeteroNetwork daemons</span>
            </div>
            <div class="table" id="services"></div>
          </section>

          <section>
            <div class="section-title">
              <h2>Links</h2>
            </div>
            <div class="links" id="links"></div>
          </section>

          <section>
            <div class="section-title">
              <h2>Notes</h2>
            </div>
            <div class="notes" id="notes"></div>
          </section>
        </div>
      </div>
    </main>

    <script>
      const fallbackState = {
        generatedAt: "2026-07-17T07:12:18Z",
        labName: "kz-hetero-net",
        runtime: {
          clusterId: "5b0acda6-ef84-4f6b-94ee-53ceefed406f",
          nodeCount: 3,
          healthyNodeCount: 3,
          pathCount: 2,
          pathStates: [{ state: "RELAY", count: 2 }],
          relayDatagramsForwarded: 405,
          relayDatagramsDropped: 102,
        },
        nodes: [
          {
            role: "public-relay",
            name: "kz-hetero-net-public-1",
            sandboxId: "ad222ef0596b4159b44531dd319448a8",
            nodeId: "node-9fbf2110a46c2f823e443161e6b11bbc",
            underlay: "192.168.0.205",
            overlay: "100.64.0.1",
            namespace: "root",
            candidate: "169.254.68.6:51830",
            services: ["control-plane", "signal", "stun", "relay", "agent"],
          },
          {
            role: "nat",
            name: "kz-hetero-net-nat-1",
            sandboxId: "0211bd356ddc445992cb47e27fa4f4f0",
            nodeId: "node-cfaa6b41510e881dbff71b142d00ec16",
            underlay: "192.168.1.214",
            inner: "10.88.1.2",
            overlay: "100.64.0.2",
            namespace: "kzhn-node",
            candidate: "192.168.1.214:51832",
            services: ["agent"],
          },
          {
            role: "double-nat",
            name: "kz-hetero-net-double-nat-1",
            sandboxId: "b2efe3d326654ef8a4824a33a181768c",
            nodeId: "node-2c5c7e227ab834e3b5d261fdb6566edf",
            underlay: "192.168.1.3",
            inner: "10.89.1.2",
            overlay: "100.64.0.3",
            namespace: "kzhd-node",
            candidate: "192.168.1.3:51833",
            services: ["agent"],
          },
        ],
        checks: [
          { from: "NAT inner", to: "Public underlay", path: "10.88.1.2 -> 192.168.0.205", result: "reachable", detail: "raw egress OK" },
          { from: "Double NAT inner", to: "Public underlay", path: "10.89.1.2 -> 192.168.0.205", result: "reachable", detail: "raw egress OK" },
          { from: "Public", to: "NAT inner", path: "192.168.0.205 -> 10.88.1.2", result: "blocked", detail: "inbound raw path blocked" },
          { from: "Public", to: "Double NAT inner", path: "192.168.0.205 -> 10.89.1.2", result: "blocked", detail: "inbound raw path blocked" },
          { from: "NAT inner", to: "Double NAT inner", path: "10.88.1.2 -> 10.89.1.2", result: "blocked", detail: "raw private-to-private blocked" },
          { from: "Double NAT inner", to: "NAT inner", path: "10.89.1.2 -> 10.88.1.2", result: "blocked", detail: "raw private-to-private blocked" },
          { from: "NAT overlay", to: "Double NAT overlay", path: "100.64.0.2 -> 100.64.0.3", result: "down", detail: "control-plane selected RELAY, ping lost" },
          { from: "Double NAT overlay", to: "NAT overlay", path: "100.64.0.3 -> 100.64.0.2", result: "down", detail: "control-plane selected RELAY, ping lost" },
        ],
        paths: [
          { local: "node-cfaa6b41510e881dbff71b142d00ec16", remote: "node-2c5c7e227ab834e3b5d261fdb6566edf", state: "RELAY", relay: "node-9fbf2110a46c2f823e443161e6b11bbc", dataplane: "down" },
          { local: "node-2c5c7e227ab834e3b5d261fdb6566edf", remote: "node-cfaa6b41510e881dbff71b142d00ec16", state: "RELAY", relay: "node-9fbf2110a46c2f823e443161e6b11bbc", dataplane: "down" },
        ],
        services: [
          { node: "public", service: "control-plane", endpoint: "0.0.0.0:8443", status: "running" },
          { node: "public", service: "signal", endpoint: "0.0.0.0:9443", status: "running" },
          { node: "public", service: "stun", endpoint: "0.0.0.0:3478/udp", status: "running" },
          { node: "public", service: "relay", endpoint: "0.0.0.0:51820/udp, 0.0.0.0:9580", status: "running" },
          { node: "public", service: "agent", endpoint: "0.0.0.0:9780", status: "running" },
          { node: "nat", service: "agent", endpoint: "kzhn-node:9780", status: "running" },
          { node: "double-nat", service: "agent", endpoint: "kzhd-node:9780", status: "running" },
        ],
        links: [
          { label: "KakuriZai Studio", href: "http://100.105.153.15:38476/" },
          { label: "Keycloak", href: "http://100.105.153.15:18080/" },
        ],
        notes: [
          "This console is served from the HeteroNetwork deployment on port 18088.",
          "Control-plane path selection is live and reports RELAY for NAT <-> double NAT.",
          "Current dataplane ping over the overlay is down, so the console separates control-plane state from dataplane verification.",
        ],
      };

      async function loadState() {
        try {
          const response = await fetch("state.json?ts=" + Date.now(), { cache: "no-store" });
          if (!response.ok) throw new Error("state.json not available");
          return await response.json();
        } catch {
          return fallbackState;
        }
      }

      function esc(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        }[char]));
      }

      function statusClass(value) {
        const normalized = String(value || "").toLowerCase();
        if (["reachable", "running", "healthy", "relay"].includes(normalized)) return "good";
        if (["blocked", "planned", "degraded"].includes(normalized)) return "warn";
        if (["down", "failed", "unhealthy"].includes(normalized)) return "bad";
        return "";
      }

      function status(value) {
        const cls = statusClass(value);
        return `<span class="status ${cls}"><span class="dot"></span>${esc(value)}</span>`;
      }

      function table(target, columns, rows) {
        const head = `<div class="row head">${columns.map((column) => `<div class="cell">${esc(column.label)}</div>`).join("")}</div>`;
        const body = rows.map((row) => {
          const cells = columns.map((column) => {
            const raw = typeof column.value === "function" ? column.value(row) : row[column.key];
            const value = column.status ? status(raw) : esc(raw);
            const mono = column.mono ? " mono" : "";
            return `<div class="cell${mono}">${value}</div>`;
          }).join("");
          return `<div class="row">${cells}</div>`;
        }).join("");
        document.getElementById(target).innerHTML = head + body;
      }

      function renderTopology(state) {
        const [pub, nat, dbl] = state.nodes;
        const svg = document.getElementById("topology");
        svg.innerHTML = `
          <defs>
            <marker id="arrow-good" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L0,6 L9,3 z" fill="var(--good)"></path>
            </marker>
            <marker id="arrow-bad" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L0,6 L9,3 z" fill="var(--bad)"></path>
            </marker>
            <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L0,6 L9,3 z" fill="var(--warn)"></path>
            </marker>
          </defs>
          ${edge(240, 147, 435, 176, "egress OK", "edge-good", "arrow-good")}
          ${edge(545, 176, 750, 147, "egress OK", "edge-good", "arrow-good")}
          ${edge(330, 220, 700, 220, "raw private path blocked", "edge-bad", "arrow-bad", true)}
          ${edge(330, 280, 700, 280, "control-plane: RELAY / dataplane ping: down", "edge-warn", "arrow-warn", true)}
          ${node(80, 88, "Public relay", pub.name, [pub.underlay, pub.overlay, shortNode(pub.nodeId)])}
          ${node(380, 72, "NAT node", nat.name, [nat.inner, nat.overlay, nat.candidate])}
          ${node(690, 88, "Double NAT node", dbl.name, [dbl.inner, dbl.overlay, dbl.candidate])}
          <text x="74" y="365" class="node-meta">Underlay: NAT/double NAT can egress to public. Public cannot directly enter private inner nodes.</text>
          <text x="74" y="388" class="node-meta">Overlay: HeteroNetwork path selection reports relay, but current ICMP dataplane check is down.</text>
        `;
      }

      function edge(x1, y1, x2, y2, label, cls, marker, dashed = false) {
        const dash = dashed ? 'stroke-dasharray="7 7"' : "";
        const midX = (x1 + x2) / 2;
        const midY = (y1 + y2) / 2 - 10;
        return `
          <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" class="${cls}" stroke-width="2.4" marker-end="url(#${marker})" ${dash}></line>
          <text x="${midX}" y="${midY}" class="edge-label" text-anchor="middle">${esc(label)}</text>
        `;
      }

      function node(x, y, title, name, lines) {
        return `
          <g>
            <rect class="node-box" x="${x}" y="${y}" width="235" height="148" rx="8"></rect>
            <text x="${x + 16}" y="${y + 30}" class="node-title">${esc(title)}</text>
            <text x="${x + 16}" y="${y + 53}" class="node-meta">${esc(name)}</text>
            ${lines.slice(0, 3).map((line, index) => `<text x="${x + 16}" y="${y + 82 + (index * 22)}" class="node-meta">${esc(line)}</text>`).join("")}
          </g>
        `;
      }

      function shortNode(nodeId) {
        const value = String(nodeId || "");
        if (value.length <= 22) return value;
        return value.slice(0, 14) + "..." + value.slice(-6);
      }

      function render(state) {
        document.getElementById("subtitle").textContent =
          `${state.labName} / verified ${state.generatedAt}`;

        const overlayDown = state.checks.some((check) => check.path.includes("100.64.") && check.result === "down");
        document.getElementById("chips").innerHTML = [
          `<span class="chip good">nodes ${state.runtime.healthyNodeCount}/${state.runtime.nodeCount} healthy</span>`,
          `<span class="chip good">path ${state.runtime.pathStates.map((item) => `${item.state}:${item.count}`).join(", ")}</span>`,
          `<span class="chip ${overlayDown ? "bad" : "good"}">dataplane ${overlayDown ? "down" : "ok"}</span>`,
          `<span class="chip">cluster ${state.runtime.clusterId}</span>`,
        ].join("");

        renderTopology(state);

        document.getElementById("metrics").innerHTML = [
          ["Healthy nodes", `${state.runtime.healthyNodeCount}/${state.runtime.nodeCount}`],
          ["Selected paths", state.runtime.pathCount],
          ["Relay forwarded", state.runtime.relayDatagramsForwarded],
          ["Relay dropped", state.runtime.relayDatagramsDropped],
          ["Lab nodes", state.nodes.length],
          ["Updated", state.generatedAt.replace("T", " ").replace("Z", " UTC")],
        ].map(([label, value]) => `<div class="metric"><span>${esc(label)}</span><strong>${esc(value)}</strong></div>`).join("");

        table("checks", [
          { label: "From", key: "from" },
          { label: "To", key: "to" },
          { label: "Result", key: "result", status: true },
          { label: "Path", key: "path", mono: true },
        ], state.checks);

        table("nodes", [
          { label: "Node", key: "name" },
          { label: "Role", key: "role" },
          { label: "Overlay", key: "overlay", mono: true },
          { label: "Identity", key: "nodeId", mono: true },
        ], state.nodes);

        table("paths", [
          { label: "Local", key: "local", mono: true },
          { label: "Remote", key: "remote", mono: true },
          { label: "State", key: "state", status: true },
          { label: "Dataplane", key: "dataplane", status: true },
        ], state.paths);

        table("services", [
          { label: "Node", key: "node" },
          { label: "Service", key: "service" },
          { label: "Status", key: "status", status: true },
          { label: "Endpoint", key: "endpoint", mono: true },
        ], state.services);

        document.getElementById("links").innerHTML = state.links.map((link) =>
          `<a href="${esc(link.href)}"><strong>${esc(link.label)}</strong><span>${esc(link.href)}</span></a>`
        ).join("");

        document.getElementById("notes").innerHTML = state.notes.map((note) => `<div>${esc(note)}</div>`).join("");
      }

      loadState().then(render);
    </script>
  </body>
</html>
